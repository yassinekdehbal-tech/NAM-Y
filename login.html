
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMY — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arctic.css">
<style>
/* Login-specific layout */
body{display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:420px;display:flex;flex-direction:column;gap:20px}
.logo{text-align:center}
.logo-text{font-family:'DM Sans',sans-serif;font-size:28px;font-weight:800;letter-spacing:10px;color:var(--text-primary)}
.logo-sub{font-size:12px;color:var(--text-muted);margin-top:6px;letter-spacing:1px}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;display:flex;flex-direction:column;gap:16px;box-shadow:var(--shadow-md)}
.card-title{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text-primary)}
.card-sub{font-size:13px;color:var(--text-muted)}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted)}
.fi{background:var(--bg-hover);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .15s;width:100%}
.fi:focus{border-color:var(--accent);background:rgba(0,201,167,.05)}
.fi.err{border-color:var(--danger)}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px}
.err-box{font-size:12.5px;color:var(--danger);display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--danger-bg);border:1px solid rgba(153,27,27,.15);border-radius:var(--radius-md)}
.err-box.show{display:flex}
.btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:var(--radius-md);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--accent-dark)}
.btn:disabled{background:var(--bg-active);color:var(--text-muted);cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.link{text-align:center;font-size:13px;color:var(--text-muted);cursor:pointer}
.link:hover{color:var(--accent)}
.loading{display:none;flex-direction:column;align-items:center;gap:20px;padding:40px;text-align:center}
.loading.show{display:flex}
.ls-logo{font-family:'DM Sans',sans-serif;font-size:28px;font-weight:800;letter-spacing:8px;color:var(--text-primary)}
.ls-spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.ls-txt{font-size:14px;color:var(--text-muted)}
.success-box{font-size:12.5px;color:var(--accent-dark);display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--accent-light);border:1px solid rgba(0,201,167,.25);border-radius:var(--radius-md)}
.success-box.show{display:flex}
</style>
</head>
<body>

<!-- Login form -->
<div class="box" id="login-box">
  <div class="logo">
    <div class="logo-text">N A M Y</div>
    <div class="logo-sub">Transport Management System · FISSA LIV</div>
  </div>

  <div class="card" id="card-login">
    <div>
      <div class="card-title">Connexion</div>
      <div class="card-sub">Accédez à votre espace NAMY</div>
    </div>

    <div class="err-box" id="err-box">⚠️ <span id="err-txt">Email ou mot de passe incorrect</span></div>

    <div class="fg">
      <label class="fl">Adresse email</label>
      <input type="email" class="fi" id="email" placeholder="votre@email.fr" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="fg">
      <label class="fl">Mot de passe</label>
      <div class="pw-wrap">
        <input type="password" class="fi" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-eye" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">Se connecter →</button>
    <div class="link" onclick="showReset()">Mot de passe oublié ?</div>
  </div>

  <!-- Reset password -->
  <div class="card" id="card-reset" style="display:none">
    <div class="card-title" style="font-size:16px">🔑 Réinitialiser le mot de passe</div>
    <div class="fg">
      <label class="fl">Votre email</label>
      <input type="email" class="fi" id="reset-email" placeholder="votre@email.fr">
    </div>
    <div class="success-box" id="reset-ok">✅ Email envoyé ! Vérifiez votre boîte mail.</div>
    <div class="err-box" id="reset-err">⚠️ <span id="reset-err-txt"></span></div>
    <button class="btn" onclick="doReset()" style="font-size:14px;padding:11px">Envoyer le lien →</button>
    <div class="link" onclick="showLogin()">← Retour à la connexion</div>
  </div>
</div>

<!-- Loading après login -->
<div class="box loading" id="loading">
  <div>
    <div class="ls-logo">N A M Y</div>
  </div>
  <div class="ls-spin"></div>
  <div class="ls-txt" id="ls-txt">Connexion en cours...</div>
</div>

<script>
// Redirect par rôle
const REDIRECTS = {
  admin:       'dashboard.html',
  client:      'dashboard-client.html',
  fournisseur: 'dashboard-transporteur.html',
  dispatcher:  'dispatch.html',
  vendeur:     'formulaire-vendeur.html',
  livreur:     'chauffeur.html',
};

// Vérifier session existante au chargement
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    showLoading('Session active détectée...');
    await redirectUser(session.user.id);
  }
});

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');

  hideErr();
  if (!email || !pw) { showErr('Renseignez votre email et mot de passe'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Connexion...';

  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pw });

    if (error) {
      const msg = error.message.includes('Invalid') ? 'Email ou mot de passe incorrect' : error.message;
      showErr(msg);
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
      return;
    }

    showLoading(`Bienvenue ! Chargement de votre espace...`);
    await redirectUser(data.user.id);

  } catch (e) {
    showErr('Erreur réseau. Vérifiez votre connexion.');
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}

// ── REDIRECT ──────────────────────────────────────────────────
async function redirectUser(userId) {
  try {
    const { data: profil, error } = await db
      .from('utilisateurs')
      .select('role, prenom, nom, entreprise_id')
      .eq('auth_id', userId)
      .single();

    if (error || !profil) {
      // Profil pas encore créé — afficher message
      document.getElementById('ls-txt').textContent =
        '⚠️ Profil non configuré. Contactez votre administrateur.';
      setTimeout(async () => {
        await db.auth.signOut();
        showLogin();
        document.getElementById('loading').classList.remove('show');
        document.getElementById('login-box').style.display = 'flex';
      }, 4000);
      return;
    }

    // Stocker en session
    sessionStorage.setItem('namy_user', JSON.stringify({
      ...profil,
      auth_id: userId
    }));
    sessionStorage.setItem('namy_role', profil.role);

    document.getElementById('ls-txt').textContent =
      `Bonjour ${profil.prenom} ! Redirection vers votre espace ${profil.role}...`;

    // Redirect
    setTimeout(() => {
      window.location.href = REDIRECTS[profil.role] || 'dashboard.html';
    }, 1200);

  } catch (e) {
    document.getElementById('ls-txt').textContent = 'Erreur lors du chargement du profil.';
    setTimeout(() => {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('login-box').style.display = 'flex';
    }, 3000);
  }
}

// ── RESET PASSWORD ────────────────────────────────────────────
async function doReset() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return;

  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });

  if (error) {
    document.getElementById('reset-err-txt').textContent = error.message;
    document.getElementById('reset-err').classList.add('show');
  } else {
    document.getElementById('reset-ok').classList.add('show');
    document.getElementById('reset-err').classList.remove('show');
  }
}

// ── UI HELPERS ────────────────────────────────────────────────
function showLoading(txt) {
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('ls-txt').textContent = txt;
  document.getElementById('loading').classList.add('show');
}

function showErr(msg) {
  document.getElementById('err-txt').textContent = msg;
  document.getElementById('err-box').classList.add('show');
  document.getElementById('email').classList.add('err');
  document.getElementById('password').classList.add('err');
}

function hideErr() {
  document.getElementById('err-box').classList.remove('show');
  document.getElementById('email').classList.remove('err');
  document.getElementById('password').classList.remove('err');
}

function showReset() {
  document.getElementById('card-login').style.display = 'none';
  document.getElementById('card-reset').style.display = 'flex';
  document.getElementById('reset-email').focus();
}

function showLogin() {
  document.getElementById('card-reset').style.display = 'none';
  document.getElementById('card-login').style.display = 'flex';
}

function togglePw() {
  const i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
