<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMY — Expéditions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arctic.css">
<link rel="stylesheet" href="styles.css">
<script src="https://browser.sentry-cdn.com/8.51.0/bundle.min.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* Page-level overrides for standalone expeditions page */
  body {
    overflow: auto;
  }

  .exp-wrapper {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .exp-header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .exp-header-left {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .exp-logo {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 6px;
    color: var(--text-primary);
    text-decoration: none;
  }

  .exp-nav {
    display: flex;
    gap: 4px;
  }

  .exp-nav a {
    padding: 7px 14px;
    border-radius: var(--radius);
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .exp-nav a:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .exp-nav a.active {
    background: var(--accent);
    color: white;
  }

  .exp-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .role-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(124,58,237,0.15);
    color: #7C3AED;
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--danger);
    font-size: 12.5px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-logout:hover {
    background: var(--danger-bg);
    border-color: var(--danger);
  }

  /* Main body */
  .exp-body {
    flex: 1;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  /* Period buttons */
  .period-btns {
    display: flex;
    gap: 4px;
  }

  .period-btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .period-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .period-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Filters row */
  .filters-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--bg-surface);
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-group label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .filter-sep {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  /* Statut filter buttons */
  .statut-btns {
    display: flex;
    gap: 3px;
  }

  .statut-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .statut-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  .statut-btn.active {
    color: white;
  }

  .statut-btn[data-statut="en_attente"].active { background: var(--warning); border-color: var(--warning); }
  .statut-btn[data-statut="planifie"].active { background: var(--info); border-color: var(--info); }
  .statut-btn[data-statut="en_cours"].active { background: var(--accent); border-color: var(--accent); }
  .statut-btn[data-statut="livre"].active { background: var(--success); border-color: var(--success); }
  .statut-btn[data-statut="echec"].active { background: var(--danger); border-color: var(--danger); }
  .statut-btn[data-statut="litige"].active { background: #dc2626; border-color: #dc2626; }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 12px 0;
  }

  .page-btn {
    min-width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .page-btn.active { background: var(--text-primary); border-color: var(--text-primary); color: white; }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 8px;
  }

  /* Export footer */
  .exp-footer {
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .footer-info {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Table responsive */
  @media (max-width: 1024px) {
    .exp-body { padding: 12px; }
    .filters-row { flex-direction: column; align-items: stretch; }
    .filter-sep { display: none; }
    .table-container { overflow-x: auto; }
  }

  /* Status change form in modal */
  .status-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .status-form select,
  .status-form textarea {
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    color: var(--text-primary);
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    width: 100%;
  }

  .status-form textarea { min-height: 80px; resize: vertical; }
  .status-form select:focus,
  .status-form textarea:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div class="exp-wrapper">

  <!-- HEADER -->
  <header class="exp-header" style="display:none">
    <div class="exp-header-left">
      <a href="index.html" class="exp-logo">N A M Y</a>
      <nav class="exp-nav" id="main-nav">
        <a href="index.html" class="active">Expéditions</a>
        <a href="dispatch.html" data-roles="admin,dispatcher">Dispatch</a>
        <a href="grilles-tarifaires.html" data-roles="admin">Grilles</a>
        <a href="admin.html" data-roles="admin">Admin</a>
        <a href="dashboard.html" data-roles="admin,dispatcher">Dashboard</a>
        <a href="dashboard.html" data-roles="client,dirigeant,fournisseur,exploitant">Mon espace</a>
        <a href="formulaire-vendeur.html" data-roles="vendeur">Nouvelle expédition</a>
      </nav>
    </div>
    <div class="exp-header-right">
      <div class="user-info">
        <span id="user-name">—</span>
        <span class="role-badge" id="user-role">—</span>
      </div>
      <button class="btn-logout" onclick="logout()">Deconnexion</button>
    </div>
  </header>

  <!-- BODY -->
  <div class="exp-body">

    <!-- Page title -->
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between">
      <h1>Liste des expéditions</h1>
      <button id="btn-new-expedition" onclick="window.location.href='formulaire-vendeur.html'" class="btn btn-primary" style="display:none;font-size:13px;padding:8px 16px">+ Créer une expédition</button>
    </div>

    <!-- FILTERS BAR -->
    <div class="filters-row">
      <!-- Period -->
      <div class="filter-group">
        <label>Periode :</label>
        <div class="period-btns">
          <button class="period-btn" data-period="today" onclick="setPeriod('today',this)">Aujourd'hui</button>
          <button class="period-btn" data-period="7d" onclick="setPeriod('7d',this)">7j</button>
          <button class="period-btn active" data-period="30d" onclick="setPeriod('30d',this)">30j</button>
          <button class="period-btn" data-period="custom" onclick="setPeriod('custom',this)">Personnalise</button>
        </div>
      </div>

      <!-- Custom dates (hidden by default) -->
      <div class="filter-group" id="custom-dates" style="display:none">
        <input type="date" class="filter-input filter-date" id="filter-date-start">
        <span style="color:var(--text-muted)">a</span>
        <input type="date" class="filter-input filter-date" id="filter-date-end">
      </div>

      <div class="filter-sep"></div>

      <!-- Statut -->
      <div class="filter-group">
        <label>Statut :</label>
        <div class="statut-btns">
          <button class="statut-btn" data-statut="accepte" onclick="toggleStatut(this)">Accepté</button>
          <button class="statut-btn" data-statut="en_attente" onclick="toggleStatut(this)">En attente</button>
          <button class="statut-btn" data-statut="retire" onclick="toggleStatut(this)">Retiré</button>
          <button class="statut-btn" data-statut="echec_retrait" onclick="toggleStatut(this)">Échec retrait</button>
          <button class="statut-btn" data-statut="livre" onclick="toggleStatut(this)">Livré</button>
          <button class="statut-btn" data-statut="echec_livraison" onclick="toggleStatut(this)">Échec livraison</button>
          <button class="statut-btn" data-statut="retourne" onclick="toggleStatut(this)">Retourné</button>
        </div>
      </div>

      <div class="filter-sep"></div>

      <!-- Magasin -->
      <div class="filter-group">
        <select class="filter-select" id="filter-magasin" onchange="applyFilters()">
          <option value="">Tous les magasins</option>
        </select>
      </div>

      <!-- Chauffeur -->
      <div class="filter-group">
        <select class="filter-select" id="filter-chauffeur" onchange="applyFilters()">
          <option value="">Tous les chauffeurs</option>
        </select>
      </div>

      <div class="filter-sep"></div>

      <!-- Search -->
      <div class="filter-group">
        <input type="text" class="filter-input" id="filter-search" placeholder="Rechercher..." oninput="applyFilters()">
      </div>

      <!-- Reset -->
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reinitialiser</button>
    </div>

    <!-- STATS ROW -->
    <div class="quick-stats">
      <div class="stat-card">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card stat-success">
        <span class="stat-value" id="stat-accepte">0</span>
        <span class="stat-label">Accepté</span>
      </div>
      <div class="stat-card stat-warning">
        <span class="stat-value" id="stat-attente">0</span>
        <span class="stat-label">En attente</span>
      </div>
      <div class="stat-card stat-info">
        <span class="stat-value" id="stat-retire">0</span>
        <span class="stat-label">Retiré</span>
      </div>
      <div class="stat-card stat-success">
        <span class="stat-value" id="stat-livre">0</span>
        <span class="stat-label">Livré</span>
      </div>
      <div class="stat-card stat-danger">
        <span class="stat-value" id="stat-echec">0</span>
        <span class="stat-label">Échecs</span>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
      <table class="data-table" id="expeditions-table">
        <thead>
          <tr>
            <th class="sortable" onclick="sortBy('date_livraison')">Date <span class="sort-icon" id="sort-date_livraison">&#8595;</span></th>
            <th class="sortable" onclick="sortBy('id')">N° <span class="sort-icon" id="sort-id">&#8597;</span></th>
            <th class="sortable" onclick="sortBy('exp_nom')">Magasin <span class="sort-icon" id="sort-exp_nom">&#8597;</span></th>
            <th class="sortable" onclick="sortBy('dest_nom')">Destinataire <span class="sort-icon" id="sort-dest_nom">&#8597;</span></th>
            <th>Statut</th>
            <th class="sortable" onclick="sortBy('chauffeur')">Chauffeur <span class="sort-icon" id="sort-chauffeur">&#8597;</span></th>
            <th class="sortable" onclick="sortBy('prix_ttc')">Prix TTC <span class="sort-icon" id="sort-prix_ttc">&#8597;</span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expeditions-tbody"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>

  </div>

  <!-- FOOTER -->
  <div class="exp-footer">
    <span class="footer-info" id="footer-info">0 expeditions</span>
    <button class="btn btn-secondary btn-sm" onclick="exportCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter CSV
    </button>
  </div>

</div>

<!-- MODAL: DETAIL EXPEDITION -->
<div class="modal-overlay" id="modal-detail" style="display:none">
  <div class="modal modal-large">
    <div class="modal-header">
      <h2>Expedition <span id="detail-id" style="font-family:'DM Mono',monospace"></span></h2>
      <button class="modal-close" onclick="closeModal('modal-detail')">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-detail')">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL: CHANGE STATUS -->
<div class="modal-overlay" id="modal-status" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Modifier le statut</h2>
      <button class="modal-close" onclick="closeModal('modal-status')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="status-exp-id">
      <div class="status-form">
        <div class="form-group">
          <label>Nouveau statut</label>
          <select id="status-new" class="form-control">
            <option value="accepte">Accepté</option>
            <option value="en_attente">En attente (devis)</option>
            <option value="retire">Retiré</option>
            <option value="echec_retrait">Échec retrait</option>
            <option value="livre">Livré</option>
            <option value="echec_livraison">Échec livraison</option>
            <option value="retourne">Retourné</option>
          </select>
        </div>
        <div class="form-group">
          <label>Commentaire (optionnel)</label>
          <textarea id="status-comment" class="form-control" placeholder="Ajouter un commentaire..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-status')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmStatusChange()">Valider</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;cursor:zoom-out">
  <img id="lightbox-img" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,.5)">
</div>

<!-- TOAST -->
<div id="toast" class="toast" style="display:none"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
