<style>
body{background:#F7F9FC;font-family:'DM Sans',sans-serif;color:#1A2332}
.page{max-width:1200px;margin:20px auto;padding:0 20px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:20px;font-weight:700}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.flt{padding:6px 12px;background:#fff;border:1px solid #E8EDF3;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;color:#1A2332;outline:none;cursor:pointer}
.flt:focus{border-color:#00C9A7}
.card{background:#fff;border:1px solid #E8EDF3;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{padding:10px 14px;text-align:left;font-size:11px;color:#6B7F99;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #E8EDF3;background:#F7F9FC}
td{padding:10px 14px;border-bottom:1px solid #E8EDF3}
tr:hover{background:#F0F3F8}
.badge{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;display:inline-block}
.b-ouvert{background:rgba(59,130,246,.1);color:#3B82F6}
.b-en_examen{background:rgba(245,158,11,.1);color:#F59E0B}
.b-responsabilite_confirmee{background:rgba(249,115,22,.1);color:#F97316}
.b-rejete{background:rgba(107,127,153,.1);color:#6B7F99}
.b-remboursement_accorde{background:rgba(0,201,167,.1);color:#00A389}
.b-cloture{background:rgba(107,127,153,.1);color:#6B7F99}
.btn-sm{padding:4px 12px;border:1px solid #E8EDF3;border-radius:6px;background:#fff;font-size:11px;cursor:pointer;color:#6B7F99;font-family:'DM Sans',sans-serif}
.btn-sm:hover{border-color:#00C9A7;color:#00C9A7}
.empty{text-align:center;padding:40px;color:#6B7F99;font-size:13px}
.mono{font-family:'DM Mono',monospace;font-size:12px}
</style>
</head>
<body>
<div class="page">
  <div class="page-header">
    <div class="page-title">Litiges</div>
  </div>

  <div class="filters">
    <select class="flt" id="flt-statut" onchange="loadLitiges()">
      <option value="">Tous les statuts</option>
      <option value="ouvert">Ouvert</option>
      <option value="en_examen">En examen</option>
      <option value="responsabilite_confirmee">Responsabilité confirmée</option>
      <option value="remboursement_accorde">Remboursement accordé</option>
      <option value="rejete">Rejeté</option>
      <option value="cloture">Clôturé</option>
    </select>
  </div>

  <div class="card">
    <table>
      <thead><tr>
        <th>N° Expédition</th>
        <th>Date</th>
        <th>Ouvert par</th>
        <th>Catégorie</th>
        <th>Valeur vente</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr></thead>
      <tbody id="litiges-tbody"></tbody>
    </table>
    <div id="litiges-empty" class="empty" style="display:none">Aucun litige</div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
const CAT_LABELS = { casse:'Casse', livraison_incomplete:'Livraison incomplète', colis_manquant:'Colis manquant', erreur_adresse:'Erreur adresse' };
const STATUT_LABELS = { ouvert:'Ouvert', en_examen:'En examen', responsabilite_confirmee:'Resp. confirmée', rejete:'Rejeté', remboursement_accorde:'Remboursé', cloture:'Clôturé' };

let sessionUser = null;

document.addEventListener('DOMContentLoaded', async () => {
  sessionUser = getSessionUser();
  if (!sessionUser) { window.location.href = 'login.html'; return; }
  await loadLitiges();
});

async function loadLitiges() {
  const statut = document.getElementById('flt-statut').value;
  try {
    let q = db.from('litiges').select('*').order('created_at', { ascending: false });

    // Filter by role
    const role = sessionUser.role;
    if (['client','dirigeant','vendeur'].includes(role)) {
      q = q.eq('entreprise_client_id', sessionUser.entreprise_id);
    } else if (['fournisseur','exploitant','livreur','chauffeur'].includes(role)) {
      q = q.eq('entreprise_transporteur_id', sessionUser.entreprise_id);
    }

    if (statut) q = q.eq('statut', statut);

    const { data, error } = await q.limit(200);
    if (error) throw error;
    renderLitiges(data || []);
  } catch(e) {
    console.error('[litiges]', e);
    renderLitiges([]);
  }
}

function renderLitiges(list) {
  const tbody = document.getElementById('litiges-tbody');
  const empty = document.getElementById('litiges-empty');
  if (!list.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = list.map(l => `<tr>
    <td class="mono">#${l.expedition_id || '—'}</td>
    <td>${l.created_at ? new Date(l.created_at).toLocaleDateString('fr-FR') : '—'}</td>
    <td style="font-weight:600">${l.ouvert_par_nom || '—'}</td>
    <td>${CAT_LABELS[l.categorie] || l.categorie || '—'}</td>
    <td class="mono">${l.valeur_vente ? l.valeur_vente.toFixed(2) + ' €' : '—'}</td>
    <td><span class="badge b-${l.statut}">${STATUT_LABELS[l.statut] || l.statut}</span></td>
    <td><a href="litige-detail.html?id=${l.id}" class="btn-sm">Voir</a></td>
  </tr>`).join('');
}
</script>
</body>
</html>
