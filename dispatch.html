<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMY — Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arctic.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="supabase-client.js"></script>
<script src="utils.js"></script>
<script src="nav.js"></script>
<style>
:root {
  --sidebar-w:340px; --header-h:54px;
  --primary-dim:rgba(0,201,167,0.12);
  --success-dim:rgba(22,101,52,0.12);
  --warning-dim:rgba(133,77,14,0.12);
  --danger-dim:rgba(153,27,27,0.12);
  --purple:#7C3AED; --purple-dim:rgba(124,58,237,0.15);
}

body{height:100vh;overflow:hidden;font-size:13px}

/* ── DISPATCH BAR ── */
.dispatch-bar{background:var(--bg-surface);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;padding:0 16px;gap:12px}
.dispatch-bar-left,.dispatch-bar-right{display:flex;align-items:center;gap:6px}
.dispatch-bar-center{margin:0 auto;display:flex;background:var(--bg-page);border:1px solid var(--border);border-radius:6px;padding:2px;gap:2px}
.view-btn{padding:6px 16px;border:none;border-radius:4px;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .15s}
.view-btn.active{background:var(--accent);color:#fff}
.view-btn:hover:not(.active){color:var(--text-primary)}
.d-btn{padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-surface);color:var(--text-muted);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
.d-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── VIEW PANELS ── */
.view-panel{display:none;height:calc(100vh - 100px)}
.view-panel.active{display:block}

/* ── TIMELINE ── */
.timeline-wrapper{overflow:auto;height:100%;position:relative}
.timeline-table{width:max-content;min-width:100%;border-collapse:collapse;font-size:12px}
.timeline-table th{position:sticky;top:0;background:var(--bg-surface);border-bottom:1px solid var(--border);padding:8px 10px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;white-space:nowrap;z-index:10}
.timeline-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.tl-col-fixed{position:sticky;left:0;background:var(--bg-surface);z-index:5}
.tl-col-fixed:nth-child(2){left:160px}
.tl-col-fixed:nth-child(3){left:280px}
.tl-col-fixed:nth-child(4){left:380px}
.tl-col-fixed:nth-child(5){left:440px}
.tl-time-cell{position:relative;min-width:840px}
.tl-block{position:absolute;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;cursor:pointer;transition:opacity .15s;min-width:18px}
.tl-block:hover{opacity:.85;z-index:20}
.tl-now-line{position:absolute;top:0;bottom:0;width:2px;background:#EF4444;z-index:15;pointer-events:none}
.tl-tournee-name{display:flex;align-items:center;gap:6px;font-weight:600;font-size:12px;cursor:pointer}
.tl-tournee-name:hover{color:var(--accent)}
.tl-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}

/* ── EDITOR ── */
.editor-layout{display:flex;height:100%}
.editor-left{width:300px;border-right:1px solid var(--border);overflow-y:auto;padding:12px;background:var(--bg-surface);display:flex;flex-direction:column;gap:8px}
.editor-right{flex:1;overflow-y:auto;padding:20px;background:var(--bg-page)}
.editor-section-urgent{background:var(--danger-dim);border:1px solid rgba(153,27,27,.15);border-radius:8px;padding:10px;margin-bottom:8px}
.editor-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-hint);padding:4px 0}
.editor-tournee-item{padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;background:var(--bg-surface)}
.editor-tournee-item:hover{border-color:var(--accent)}
.editor-tournee-item.selected{border-color:var(--accent);background:var(--primary-dim)}
.editor-stop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-surface);margin-bottom:4px;cursor:grab}
.editor-stop-item:active{cursor:grabbing}
.editor-stop-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sortable-ghost{opacity:.4}

/* ── MAP LAYOUT ── */
.map-layout{display:flex;height:100%}
.map-sidebar{width:240px;background:var(--bg-surface);border-right:1px solid var(--border);overflow-y:auto}

/* ── MAP (shared) ── */
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}

.map-legend{
  position:absolute;bottom:14px;left:14px;z-index:500;
  background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 14px;backdrop-filter:blur(8px);display:flex;flex-direction:column;gap:5px;
}
.legend-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:2px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── SIDE PANEL ── */
.side-panel{position:fixed;right:0;top:100px;bottom:0;width:380px;background:var(--bg-surface);border-left:1px solid var(--border);box-shadow:0 24px 64px rgba(0,0,0,.10);z-index:50;overflow-y:auto}
.sp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.sp-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 20px}
.sp-kpi{text-align:center}
.sp-kpi-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700}
.sp-kpi-label{font-size:10px;color:var(--text-muted);text-transform:uppercase}
.sp-stop-item{display:flex;align-items:center;gap:8px;padding:8px 20px;border-bottom:1px solid var(--border);font-size:12px}

/* ── STOP POPUP ── */
.stop-popup{position:fixed;z-index:100;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 24px 64px rgba(0,0,0,.10);padding:16px;max-width:320px;font-size:12.5px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:none;
  border-radius:var(--radius-sm);font-size:12px;font-weight:600;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-ai{background:linear-gradient(135deg,var(--purple),#4F46E5);color:#fff}
.btn-ai:hover{filter:brightness(1.1)}
.btn-ghost{background:var(--bg-hover);border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{color:var(--text-primary);border-color:var(--border-strong)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid transparent}
.btn-danger:hover{border-color:var(--danger)}

/* ── MODALS ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,25,35,.45);backdrop-filter:blur(4px);
  z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.10);
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:17px;cursor:pointer;padding:4px;border-radius:4px}
.modal-close:hover{color:var(--text-primary);background:var(--bg-hover)}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:12px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted)}
.form-group input,.form-group select{
  background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 11px;color:var(--text-primary);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;transition:border-color .15s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.color-options{display:flex;gap:7px}
.color-opt{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s}
.color-opt.selected{border-color:#fff;transform:scale(1.15)}

/* Assign modal */
.assign-modal .modal{width:380px}
.assign-tournee-list{display:flex;flex-direction:column;gap:5px}
.assign-option{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg-hover);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:all .15s;
}
.assign-option:hover{border-color:var(--accent);background:var(--primary-dim)}
.assign-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.assign-name{font-weight:600;font-size:12.5px}
.assign-meta{font-size:11px;color:var(--text-muted)}
.assign-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:11.5px;color:var(--text-muted)}

/* ── AI PANEL ── */
.ai-panel{background:var(--bg-hover);border:1px solid rgba(124,58,237,.3);border-radius:var(--radius-sm);padding:10px 12px;margin:8px;flex-shrink:0}
.ai-panel-header{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.ai-icon{font-size:15px}
.ai-title{font-size:12px;font-weight:700;color:var(--purple)}
.ai-desc{font-size:11px;color:var(--text-muted);line-height:1.4;margin-bottom:8px}
.ai-progress{height:4px;background:var(--bg-active);border-radius:2px;overflow:hidden;margin-bottom:7px;display:none}
.ai-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--accent));border-radius:2px;animation:aiProgress 2s ease forwards}
@keyframes aiProgress{from{width:0}to{width:100%}}
.ai-result{font-size:11px;color:var(--success);display:none}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 18px;font-size:12.5px;z-index:9999;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.08);animation:toastIn .25s ease;display:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .dispatch-bar{flex-wrap:wrap;height:auto;padding:8px 12px}
  .dispatch-bar-center{margin:4px auto}
  .editor-layout{flex-direction:column}
  .editor-left{width:100%;max-height:40vh}
  .map-layout{flex-direction:column}
  .map-sidebar{width:100%;max-height:120px}
  .side-panel{width:100%;left:0}
}
</style>
</head>
<body>

<!-- TOP BAR with view switcher + date nav -->
<div class="dispatch-bar">
  <div class="dispatch-bar-left">
    <button onclick="shiftDate(-1)" class="d-btn">&laquo;</button>
    <input type="date" id="dispatch-date" onchange="loadDayData()">
    <button onclick="shiftDate(1)" class="d-btn">&raquo;</button>
    <button onclick="goToday()" class="d-btn">Aujourd'hui</button>
    <span id="date-label" style="font-size:13px;font-weight:600;color:var(--text-primary)"></span>
  </div>
  <div class="dispatch-bar-center">
    <button class="view-btn active" onclick="switchView('timeline',this)">Timeline</button>
    <button class="view-btn" onclick="switchView('editor',this)">Editeur</button>
    <button class="view-btn" onclick="switchView('map',this)">Carte</button>
  </div>
  <div class="dispatch-bar-right">
    <button class="btn btn-ai" onclick="autoDispatchIA()">IA Auto-dispatch</button>
    <button class="btn btn-primary" onclick="openCreateTournee()">+ Tournee</button>
  </div>
</div>

<!-- VIEW 1: TIMELINE -->
<div class="view-panel active" id="view-timeline">
  <div class="timeline-wrapper">
    <table class="timeline-table">
      <thead>
        <tr>
          <th class="tl-col-fixed" style="width:160px">Tournee</th>
          <th class="tl-col-fixed" style="width:120px">Livreur</th>
          <th class="tl-col-fixed" style="width:100px">Vehicule</th>
          <th class="tl-col-fixed" style="width:60px">Retard</th>
          <th class="tl-col-fixed" style="width:80px">Statut</th>
          <th id="tl-time-header"></th>
        </tr>
      </thead>
      <tbody id="timeline-tbody"></tbody>
    </table>
    <div class="tl-now-line" id="tl-now-line"></div>
  </div>
</div>

<!-- VIEW 2: EDITOR -->
<div class="view-panel" id="view-editor" style="display:none">
  <div class="editor-layout">
    <div class="editor-left">
      <div id="editor-unassigned" class="editor-section-urgent"></div>
      <div class="editor-section-title">Tournees du jour</div>
      <div id="editor-tournees-list"></div>
      <button onclick="openCreateTournee()" class="btn btn-primary" style="width:100%;margin-top:8px;font-size:12px">+ Nouvelle tournee</button>
    </div>
    <div class="editor-right">
      <div id="editor-detail" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">
        Selectionnez une tournee
      </div>
    </div>
  </div>
</div>

<!-- VIEW 3: MAP -->
<div class="view-panel" id="view-map" style="display:none">
  <div class="map-layout">
    <div class="map-sidebar" id="map-sidebar">
      <div style="padding:12px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border)">Filtres carte</div>
      <div id="map-filters" style="padding:12px;display:flex;flex-direction:column;gap:8px"></div>
      <div id="map-legend" style="padding:12px;border-top:1px solid var(--border)"></div>
    </div>
    <div id="map" style="flex:1"></div>
  </div>
</div>

<!-- SIDE PANEL (timeline tournee detail) -->
<div class="side-panel" id="side-panel" style="display:none">
  <div class="sp-header">
    <div id="sp-title" style="font-weight:700;font-size:15px"></div>
    <button onclick="closeSidePanel()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-muted)">&times;</button>
  </div>
  <div id="sp-content"></div>
</div>

<!-- STOP POPUP -->
<div class="stop-popup" id="stop-popup" style="display:none"></div>

<!-- Modal: Creer tournee -->
<div class="modal-overlay" id="modal-create" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Creer une tournee</span>
      <button class="modal-close" onclick="closeModal('modal-create')">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nom de la tournee *</label>
        <input type="text" id="new-nom" placeholder="Ex: TAREK 01/04">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="new-date">
        </div>
        <div class="form-group">
          <label>Heure de depart *</label>
          <input type="time" id="new-heure" value="08:00">
        </div>
      </div>
      <div class="form-group">
        <label>Chauffeur</label>
        <select id="new-chauffeur"><option value="">Non assigne</option></select>
      </div>
      <div class="form-group">
        <label>Vehicule</label>
        <select id="new-vehicule"><option value="">Non assigne</option></select>
      </div>
      <div class="form-group">
        <label>Couleur</label>
        <div class="color-options">
          <div class="color-opt selected" style="background:#4f7cff" data-color="#4f7cff" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#f43f5e" data-color="#f43f5e" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#2dd4a0" data-color="#2dd4a0" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#f59e0b" data-color="#f59e0b" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#a855f7" data-color="#a855f7" onclick="selectColor(this)"></div>
          <div class="color-opt" style="background:#ec4899" data-color="#ec4899" onclick="selectColor(this)"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-create')">Annuler</button>
      <button class="btn btn-primary" onclick="createTournee()">Creer la tournee</button>
    </div>
  </div>
</div>

<!-- Modal: Assigner -->
<div class="modal-overlay assign-modal" id="modal-assign" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Assigner a une tournee</span>
      <button class="modal-close" onclick="closeModal('modal-assign')">&#10005;</button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px" id="assign-cmd-info"></div>
      <div class="assign-tournee-list" id="assign-tournee-list"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

// ─── DATE HELPERS ───────────────────────────────────────────
function getTomorrow() { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
function getToday() { return new Date().toISOString().split('T')[0]; }
function getSelectedDate() { return document.getElementById('dispatch-date').value; }
function isAllDatesMode() { return allDatesMode; }

function initDatePicker() {
  const saved = sessionStorage.getItem('namy_dispatch_date');
  const savedAll = sessionStorage.getItem('namy_dispatch_all') === 'true';
  const inp = document.getElementById('dispatch-date');
  if (savedAll) {
    allDatesMode = true;
    inp.value = getToday();
  } else {
    inp.value = saved || getTomorrow();
  }
}

function setDate(dateStr) {
  allDatesMode = false;
  sessionStorage.setItem('namy_dispatch_all','false');
  sessionStorage.setItem('namy_dispatch_date', dateStr);
  document.getElementById('dispatch-date').value = dateStr;
  loadDayData();
}

function shiftDate(delta) {
  const d = new Date(getSelectedDate());
  d.setDate(d.getDate() + delta);
  setDate(d.toISOString().split('T')[0]);
}
function goToday() { setDate(getToday()); }

function formatDateLabel(dateStr) {
  if (allDatesMode) return 'Toutes les dates';
  const d = new Date(dateStr);
  const label = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  if (dateStr === getToday()) return "Aujourd'hui";
  if (dateStr === getTomorrow()) return 'Demain';
  return label.charAt(0).toUpperCase() + label.slice(1);
}

// ─── DATA LOADING ───────────────────────────────────────────
async function loadData() {
  const date = getSelectedDate();
  const allMode = isAllDatesMode();
  try {
    // Expeditions
    let q = db.from('expeditions').select('*').order('id',{ascending:false});
    if (!allMode) q = q.eq('date', date);
    const { data: exps } = await q;

    // Tournees
    let tq = db.from('tournees').select('*').order('heure');
    if (!allMode) tq = tq.eq('date', date);
    const { data: tours } = await tq;

    // Dropdowns
    const { data: chData } = await db.from('chauffeurs').select('*').eq('actif',true);
    const { data: vData }  = await db.from('vehicules').select('*');
    const { data: eData }  = await db.from('entreprises').select('nom').order('nom');

    commandes = (exps && exps.length) ? exps.map(mapExpedition) : filterByDate(FALLBACK_COMMANDES, date, allMode);
    tournees  = (tours && tours.length) ? tours.map(t => ({...t, stops:t.stops||[]})) : filterByDate(FALLBACK_TOURNEES, date, allMode);

    chauffeursList = (chData && chData.length)
      ? chData.filter(c => c.prenom !== 'LIVRAISONS EN ATTENTE' && c.prenom !== 'COURSE ANNULATION').map(c => `${c.prenom} ${c.nom}`.trim())
      : FALLBACK_CHAUFFEURS;
    vehiculesList  = (vData && vData.length)  ? vData.map(v => v.nom) : FALLBACK_VEHICULES;
    entreprisesList= (eData && eData.length)  ? eData.map(e => e.nom) : FALLBACK_ENTREPRISES;

    console.log('[DISPATCH] Donnees chargees depuis Supabase');
  } catch(err) {
    console.warn('[DISPATCH] Fallback local:', err);
    commandes = filterByDate(FALLBACK_COMMANDES, date, allMode);
    tournees  = filterByDate(FALLBACK_TOURNEES, date, allMode);
    chauffeursList = FALLBACK_CHAUFFEURS;
    vehiculesList  = FALLBACK_VEHICULES;
    entreprisesList= FALLBACK_ENTREPRISES;
    showToast('Mode hors ligne - donnees locales','warning');
  }

  filteredCommandes = [...commandes];
  populateDropdowns();
}

function mapExpedition(e) {
  return {
    id: e.id, expediteur: e.expediteur||'', dest: e.destinataire||'',
    dest_nom: e.dest_nom||e.destinataire||'',
    adresse: e.dest_adresse||'', dest_adresse: e.dest_adresse||'',
    cp: e.dest_cp||'', dest_cp: e.dest_cp||'',
    ville: e.dest_ville||'', dest_ville: e.dest_ville||'',
    lat: e.lat||48.85, lng: e.lng||2.35, creneau: e.creneau||'',
    option: e.lieu||'Piece du choix', poids: e.poids||0, poids_total: e.poids_total||e.poids||0,
    tournee_id: e.tournee_id||null, statut: e.statut||'en_attente', date: e.date,
  };
}

function filterByDate(arr, date, allMode) {
  if (allMode) return [...arr];
  return arr.filter(x => x.date === date);
}

function populateDropdowns() {
  // Chauffeurs
  const cs = document.getElementById('new-chauffeur');
  if (cs) {
    cs.innerHTML = '<option value="">Non assigne</option>';
    chauffeursList.forEach(n => { const o = document.createElement('option'); o.textContent = n; cs.appendChild(o); });

    vehiculesList.forEach(n => { const o = document.createElement('option'); o.textContent = n; vs.appendChild(o); });
  }
}

// ─── TIMELINE ───────────────────────────────────────────────
function renderTimeline() {
  // Build hour headers
  let hoursHtml = '';
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    hoursHtml += '<div style="display:inline-block;width:' + HOUR_PX + 'px;text-align:center;font-size:10px;color:var(--text-muted)">' + h + 'h</div>';
  }
  const th = document.getElementById('tl-time-header');
  if (th) {
    th.style.minWidth = ((HOUR_END - HOUR_START + 1) * HOUR_PX) + 'px';
    th.innerHTML = hoursHtml;
  }

  const tbody = document.getElementById('timeline-tbody');
  const STATUT_COLORS = {
    livre: '#10B981', en_cours: '#3B82F6', en_attente: '#9CA3AF',
    planifie: '#9CA3AF', echec: '#EF4444', litige: '#EF4444'
  };

  // Build rows from tournees
  let rowsHtml = '';

  // Also show unassigned as a special row
  const unassigned = commandes.filter(c => !c.tournee_id);

  tournees.forEach(t => {
    const stops = commandes.filter(c => c.tournee_id == t.id);
    const livres = stops.filter(s => s.statut === 'livre').length;
    const heureDepart = t.heure_depart || t.heure || '08:00';

    // Status badge
    let statutBadge = '<span class="tl-badge" style="background:var(--bg-hover);color:var(--text-muted)">' + (t.statut || 'brouillon') + '</span>';
    if (t.statut === 'publie' || t.statut === 'en_cours') statutBadge = '<span class="tl-badge" style="background:rgba(59,130,246,.12);color:#3B82F6">' + t.statut + '</span>';
    if (t.statut === 'termine') statutBadge = '<span class="tl-badge" style="background:rgba(16,185,129,.12);color:#10B981">termine</span>';

    // Calculate retard
    let retard = '\u2014';
    if (t.statut === 'en_cours' || t.statut === 'publie') {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      if (t.date === today) {
        const [dh, dm] = (heureDepart).split(':').map(Number);
        const expectedEnd = dh * 60 + dm + stops.length * 35;
        const nowMin = now.getHours() * 60 + now.getMinutes();
        const diff = nowMin - expectedEnd;
        if (diff > 0) retard = '<span style="color:#EF4444;font-weight:600">+' + diff + 'min</span>';
        else retard = '<span style="color:#10B981">OK</span>';
      }
    }

    // Build time blocks for stops
    const timeWidth = (HOUR_END - HOUR_START + 1) * HOUR_PX;
    let blocksHtml = '<div class="tl-time-cell" style="position:relative;height:32px;min-width:' + timeWidth + 'px">';

    stops.forEach((s, i) => {
      const eta = calcETATime(heureDepart, i);
      const etaMinutes = parseTimeToMinutes(eta);
      const left = (etaMinutes - HOUR_START * 60) / 60 * HOUR_PX;
      const width = 15 / 60 * HOUR_PX; // 15 min per stop

      let color = STATUT_COLORS[s.statut] || '#9CA3AF';
      // Check retard vs creneau
      if (s.creneau) {
        const creneauEnd = parseTimeToMinutes(s.creneau.split('-')[1] || '18:00');
        if (etaMinutes > creneauEnd + 60) color = '#EF4444';
        else if (etaMinutes > creneauEnd + 15) color = '#F59E0B';
      }

      if (left >= 0) {
        blocksHtml += '<div class="tl-block" style="left:' + left + 'px;width:' + Math.max(width, 18) + 'px;background:' + (t.couleur || color) + '" '
          + 'onclick="showStopPopup(event,\'' + s.id + '\')" '
          + 'title="' + (s.dest || s.dest_nom || '') + ' \u2014 ETA ' + eta + '">' + (i + 1) + '</div>';
      }
    });
    blocksHtml += '</div>';

    rowsHtml += '<tr>'
      + '<td class="tl-col-fixed"><div class="tl-tournee-name" onclick="openSidePanel(\'' + t.id + '\')">'
      + '<div class="tl-color-dot" style="background:' + (t.couleur || '#6B7280') + '"></div>'
      + (t.nom || '\u2014')
      + '</div></td>'
      + '<td class="tl-col-fixed" style="left:160px;font-size:11px;color:var(--text-muted)">' + (t.chauffeur || '\u2014') + '</td>'
      + '<td class="tl-col-fixed" style="left:280px;font-size:11px;color:var(--text-muted)">' + (t.vehicule || '\u2014') + '</td>'
      + '<td class="tl-col-fixed" style="left:380px;font-family:\'DM Mono\',monospace;font-size:11px">' + retard + '</td>'
      + '<td class="tl-col-fixed" style="left:440px">' + statutBadge + '</td>'
      + '<td>' + blocksHtml + '</td>'
      + '</tr>';
  });

  // Unassigned row
  if (unassigned.length > 0) {
    rowsHtml += '<tr>'
      + '<td class="tl-col-fixed"><div class="tl-tournee-name" style="color:var(--danger)">'
      + '<div class="tl-color-dot" style="background:#EF4444"></div>'
      + 'Non assignees (' + unassigned.length + ')'
      + '</div></td>'
      + '<td class="tl-col-fixed" style="left:160px;font-size:11px;color:var(--text-muted)">\u2014</td>'
      + '<td class="tl-col-fixed" style="left:280px;font-size:11px;color:var(--text-muted)">\u2014</td>'
      + '<td class="tl-col-fixed" style="left:380px">\u2014</td>'
      + '<td class="tl-col-fixed" style="left:440px"><span class="tl-badge" style="background:rgba(239,68,68,.12);color:#EF4444">urgent</span></td>'
      + '<td></td>'
      + '</tr>';
  }

  if (tbody) tbody.innerHTML = rowsHtml;

  updateNowLine();
}

function parseTimeToMinutes(t) {
  if (!t) return 480;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + (m || 0);
}

function calcETATime(heureDepart, stopIndex) {
  const startMin = parseTimeToMinutes(heureDepart);
  const etaMin = startMin + stopIndex * 35; // 35 min per stop
  const h = Math.floor(etaMin / 60);
  const m = etaMin % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function calcETA(heureDepart, stopIndex) {
  return calcETATime(heureDepart, stopIndex);
}

function updateNowLine() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const left = (nowMin - HOUR_START * 60) / 60 * HOUR_PX;
  const line = document.getElementById('tl-now-line');
  if (!line) return;
  if (left > 0 && left < (HOUR_END - HOUR_START + 1) * HOUR_PX) {
    line.style.display = 'block';
    line.style.left = (520 + left) + 'px'; // 520px = sum of fixed columns
  } else {
    line.style.display = 'none';
  }
}
setInterval(updateNowLine, 60000);

// ─── DRIVER TRACKING ────────────────────────────────────────
let driverMarkers = {};

async function initDriverTracking() {
  try {
    const { data } = await db.from('positions_chauffeurs').select('*');
    if (data) data.forEach(updateDriverMarker);
  } catch (e) { console.warn('Driver positions load failed:', e); }

  try {
    db.channel('driver-positions')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'positions_chauffeurs' }, function(payload) {
        if (payload.new) updateDriverMarker(payload.new);
      })
      .subscribe();
  } catch (e) { console.warn('Realtime subscribe failed:', e); }
}

function updateDriverMarker(pos) {
  if (!map || !pos.lat || !pos.lng) return;
  const age = (Date.now() - new Date(pos.updated_at).getTime()) / 60000;
  const color = age < 30 ? '#00C9A7' : age < 60 ? '#F59E0B' : '#991B1B';
  const label = pos.chauffeur_nom || 'Chauffeur';
  const stopsLeft = pos.stops_restants || 0;
  const ageText = age < 1 ? 'maintenant' : age < 60 ? Math.round(age) + ' min' : Math.round(age / 60) + 'h';

  if (driverMarkers[pos.chauffeur_id]) {
    map.removeLayer(driverMarkers[pos.chauffeur_id]);
  }

  const icon = L.divIcon({
    className: '',
    html: '<div style="width:28px;height:28px;background:' + color + ';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700">\ud83d\ude9a</div>',
    iconSize: [28, 28], iconAnchor: [14, 14]
  });

  driverMarkers[pos.chauffeur_id] = L.marker([pos.lat, pos.lng], { icon: icon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup('<div style="font-family:\'DM Sans\',sans-serif;min-width:140px">'
      + '<div style="font-weight:700;font-size:13px;margin-bottom:4px">' + label + '</div>'
      + '<div style="font-size:12px;color:#666">Derniere MAJ : ' + ageText + '</div>'
      + '<div style="font-size:12px;color:#666">' + stopsLeft + ' stop(s) restant(s)</div>'
      + '<div style="margin-top:6px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:4px"></span>' + (age < 30 ? 'Actif' : age < 60 ? 'Inactif' : 'Hors ligne') + '</div>'
      + '</div>');
}

function getMarkerColor(cmd) {
  const s = cmd.statut || 'en_attente';
  if (s === 'livre') return '#2dd4a0';
  if (s === 'echec') return '#f43f5e';
  if (s === 'planifie' || cmd.tournee_id) {
    const t = tournees.find(x => x.id == cmd.tournee_id);
    return t ? t.couleur : '#4f7cff';
  }
  return '#f59e0b';
}

function updateMarkers() {
  if (!map) return;
  Object.values(markers).forEach(function(m) { map.removeLayer(m); });
  markers = {};

  const list = filteredCommandes.length ? filteredCommandes : commandes;
  list.forEach(function(cmd) {
    const color = getMarkerColor(cmd);
    const sz = 14;
    const bw = 2;

    const icon = L.divIcon({
      className:'',
      html:'<div style="width:' + sz + 'px;height:' + sz + 'px;background:' + color + ';border:' + bw + 'px solid rgba(255,255,255,.5);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer"></div>',
      iconSize:[sz,sz], iconAnchor:[sz/2,sz/2],

async function assignToTournee(cmdId, tourneeId) {
  const cmd = commandes.find(c => String(c.id) === String(cmdId));
  const tournee = tournees.find(t => String(t.id) === String(tourneeId));
  if (!cmd || !tournee) return;

  // Remove from old tournee if any
  if (cmd.tournee_id) {
    const old = tournees.find(t => t.id == cmd.tournee_id);
    if (old && old.stops) old.stops = old.stops.filter(s => s != cmdId);
  }

  cmd.tournee_id = tourneeId;
  cmd.statut = 'planifie';
  if (!tournee.stops) tournee.stops = [];
  if (!tournee.stops.some(s => s == cmdId)) tournee.stops.push(cmdId);

  try {
    await db.from('expeditions').update({tournee_id:tourneeId, statut:'planifie'}).eq('id', cmdId);
  } catch(e) { console.warn('Assign failed:', e); }

  closeModal('modal-assign');
  renderAll();
  showToast('#' + cmdId + ' assignee a ' + tournee.nom);
}

async function removeFromTournee(cmdId, tourneeId) {
  const cmd = commandes.find(c => String(c.id) === String(cmdId));
  const tournee = tournees.find(t => String(t.id) === String(tourneeId));
  if (cmd) { cmd.tournee_id = null; cmd.statut = 'en_attente'; }
  if (tournee && tournee.stops) tournee.stops = tournee.stops.filter(s => s != cmdId);

  try {
    await db.from('expeditions').update({tournee_id:null, statut:'en_attente'}).eq('id', cmdId);
  } catch(e) { console.warn('Remove failed:', e); }

  renderAll();
  if (selectedEditorTournee) renderEditorDetail(selectedEditorTournee);
  showToast('#' + cmdId + ' retiree de ' + (tournee ? tournee.nom : 'tournee'));
}

// ─── HAVERSINE ──────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ─── OPTIMISER TOURNEE ──────────────────────────────────────
async function optimiserTournee(tourneeId) {
  const t = tournees.find(x => String(x.id) === String(tourneeId));
  if (!t) return;

  const stops = commandes.filter(c => c.tournee_id == t.id);
  if (stops.length < 2) { showToast('Besoin d\'au moins 2 stops'); return; }
  showToast('Optimisation de ' + t.nom + '...');

  const stopData = stops.map(function(c) {
    return { id: c.id, lat: c.lat || 48.85, lng: c.lng || 2.35, creneau: c.creneau || '99:99' };
  });

  // Grouper par creneau, puis nearest neighbor dans chaque groupe
  const creneaux = [...new Set(stopData.map(s => s.creneau))].sort();
  const optimized = [];

  for (const creneau of creneaux) {
    const group = stopData.filter(s => s.creneau === creneau);
    if (group.length <= 1) { optimized.push(...group); continue; }

    const remaining = [...group];
    let current = remaining.shift();
    const ordered = [current];

    while (remaining.length > 0) {
      let nearestIdx = 0;
      let nearestDist = Infinity;
      for (let i = 0; i < remaining.length; i++) {
        const d = haversine(current.lat, current.lng, remaining[i].lat, remaining[i].lng);
        if (d < nearestDist) { nearestDist = d; nearestIdx = i; }
      }
      current = remaining.splice(nearestIdx, 1)[0];
      ordered.push(current);
    }
    optimized.push(...ordered);
  }

  // Update stops array on tournee
  if (!t.stops) t.stops = [];
  t.stops = optimized.map(s => s.id);

  try {
    for (let i = 0; i < t.stops.length; i++) {
      await db.from('expeditions').update({ ordre: i + 1 }).eq('id', t.stops[i]);
    }
  } catch (e) { console.warn('Optimize order persist failed:', e); }

  renderAll();
  if (selectedEditorTournee === String(tourneeId)) renderEditorDetail(tourneeId);
  showToast(t.nom + ' optimisee (' + stops.length + ' stops)');
}

// ─── PUBLIER TOURNEE ────────────────────────────────────────
async function publierTournee(tourneeId) {
  const t = tournees.find(x => String(x.id) === String(tourneeId));
  if (!t) return;
  const stops = commandes.filter(c => c.tournee_id == t.id);
  if (stops.length === 0) { showToast('Ajoutez des stops avant de publier'); return; }
  t.statut = 'publie';

  try {
    await db.from('tournees').update({statut:'publie'}).eq('id', tourneeId);
    for (const s of stops) {
      await db.from('expeditions').update({statut:'planifie'}).eq('id', s.id);
    }
  } catch(e) { console.warn('Publish failed:', e); }

  renderAll();
  if (selectedEditorTournee === String(tourneeId)) renderEditorDetail(tourneeId);
  showToast(t.nom + ' publiee - ' + (t.chauffeur || 'chauffeur') + ' notifie');
}

// ─── SUPPRIMER TOURNEE ──────────────────────────────────────
async function supprimerTournee(tourneeId) {
  const t = tournees.find(x => String(x.id) === String(tourneeId));
  if (!confirm('Supprimer la tournee "' + (t ? t.nom : '') + '" ?')) return;

  commandes.forEach(function(c) { if (c.tournee_id == tourneeId) { c.tournee_id = null; c.statut = 'en_attente'; } });
  tournees = tournees.filter(x => String(x.id) !== String(tourneeId));

  try {
    await db.from('expeditions').update({tournee_id:null, statut:'en_attente'}).match({tournee_id:tourneeId});
    await db.from('tournees').delete().eq('id', tourneeId);
  } catch(e) { console.warn('Delete failed:', e); }

  if (selectedEditorTournee === String(tourneeId)) {
    selectedEditorTournee = null;
    const det = document.getElementById('editor-detail');
    if (det) det.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:14px">Selectionnez une tournee</div>';
  }

  renderAll();
  showToast('Tournee supprimee');
}

// ─── CREATE TOURNEE ─────────────────────────────────────────
function openCreateTournee() {
  const newDateEl = document.getElementById('new-date');
  if (newDateEl) newDateEl.value = getSelectedDate();
  document.getElementById('modal-create').style.display = 'flex';
}

async function createTournee() {
  const nom = document.getElementById('new-nom').value.trim();
  const date = document.getElementById('new-date').value;
  const heure = document.getElementById('new-heure').value;
  const chauffeur = document.getElementById('new-chauffeur').value;
  const vehicule = document.getElementById('new-vehicule').value;

  if (!nom) { showToast('Donnez un nom a la tournee'); return; }

  const newId = 'local_' + Date.now();
  const t = { id:newId, nom:nom, couleur:selectedColor, date:date, heure:heure, chauffeur:chauffeur, vehicule:vehicule, statut:'brouillon', stops:[] };
  tournees.push(t);

  try {
    const { data, error } = await db.from('tournees').insert({
      nom:nom, date:date, heure:heure, chauffeur:chauffeur, vehicule:vehicule, couleur:selectedColor, statut:'brouillon'
    }).select().single();
    if (!error && data) t.id = data.id;
  } catch(e) { console.warn('Insert tournee failed:', e); }

  closeModal('modal-create');
  document.getElementById('new-nom').value = '';
  renderAll();
  showToast('Tournee "' + nom + '" creee');
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(function(e) { e.classList.remove('selected'); });
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

// ─── AUTO-DISPATCH IA ───────────────────────────────────────
async function autoDispatchIA() {
  const nonAssignees = commandes.filter(c => !c.tournee_id);
  if (nonAssignees.length === 0) { showToast('Toutes les commandes sont deja assignees'); return; }

  showToast('IA en cours - analyse des zones et creneaux...');
  await new Promise(r => setTimeout(r, 2000));

  // Group by creneau + geographic zone
  const groupes = {};
  nonAssignees.forEach(function(c) {
    const zone = c.lng > 2.3 ? 'EST' : 'OUEST';
    const key = (c.creneau || '00') + '_' + zone;
    if (!groupes[key]) groupes[key] = [];
    groupes[key].push(c);
  });

  let tourneeIdx = 0;
  const chauffeurs = chauffeursList.length ? chauffeursList.slice(0,4) : FALLBACK_CHAUFFEURS.slice(0,4);
  const selectedDate = getSelectedDate();

  for (const key of Object.keys(groupes)) {
    const cmds = groupes[key];
    if (cmds.length === 0) continue;

    let t;
    if (tourneeIdx < tournees.length && commandes.filter(c => c.tournee_id == tournees[tourneeIdx].id).length === 0) {
      t = tournees[tourneeIdx];
    } else {
      const newId = 'ia_' + Date.now() + '_' + tourneeIdx;
      const cIdx = tourneeIdx % chauffeurs.length;
      const color = TOURNEE_COLORS[tourneeIdx % TOURNEE_COLORS.length];
      t = { id:newId, nom:'IA_' + key.replace(/:/g,''), couleur:color, date:selectedDate, heure:'08:00', chauffeur:chauffeurs[cIdx], vehicule:'Fourgon 12m3', statut:'brouillon', stops:[] };
      tournees.push(t);

      try {
        const { data, error } = await db.from('tournees').insert({
          nom:t.nom, date:t.date, heure:t.heure, chauffeur:t.chauffeur,
          vehicule:t.vehicule, couleur:t.couleur, statut:'brouillon'
        }).select().single();
        if (!error && data) t.id = data.id;
      } catch(e) { console.warn('IA tournee insert failed:', e); }
    }

    for (const c of cmds) {
      c.tournee_id = t.id;
      c.statut = 'planifie';
      if (!t.stops) t.stops = [];
      if (!t.stops.some(s => s == c.id)) t.stops.push(c.id);

      try {
        await db.from('expeditions').update({tournee_id:t.id, statut:'planifie'}).eq('id', c.id);
      } catch(e) { console.warn('IA assign failed:', e); }
    }
    tourneeIdx++;
  }

  renderAll();
  showToast(nonAssignees.length + ' commandes reparties en ' + tourneeIdx + ' tournees par l\'IA');
}

// ─── REALTIME ───────────────────────────────────────────────
function initRealtime() {
  try {
    db.channel('dispatch-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tournee_stops' }, function() {
        loadDayData();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tournees' }, function() {
        loadDayData();
      })
      .subscribe();
  } catch(e) { console.warn('Realtime init failed:', e); }
}

// ─── LOAD DAY DATA ──────────────────────────────────────────
async function loadDayData() {
  const date = getSelectedDate();
  sessionStorage.setItem('namy_dispatch_date', date);

  try {
    let expQ = db.from('expeditions').select('*').order('id',{ascending:false});
    if (!allDatesMode) expQ = expQ.eq('date', date);
    const { data: expData } = await expQ;

    let tourQ = db.from('tournees').select('*').order('heure');
    if (!allDatesMode) tourQ = tourQ.eq('date', date);
    const { data: tourData } = await tourQ;

    commandes = (expData && expData.length) ? expData.map(mapExpedition) : filterByDate(FALLBACK_COMMANDES, date, allDatesMode);
    tournees  = (tourData && tourData.length) ? tourData.map(t => ({...t, stops:t.stops||[]})) : filterByDate(FALLBACK_TOURNEES, date, allDatesMode);
  } catch(e) {
    console.warn('loadDayData failed:', e);
    commandes = filterByDate(FALLBACK_COMMANDES, date, allDatesMode);
    tournees  = filterByDate(FALLBACK_TOURNEES, date, allDatesMode);
  }

  filteredCommandes = [...commandes];
  const newDateEl = document.getElementById('new-date');
  if (newDateEl) newDateEl.value = date;
  renderAll();
}
