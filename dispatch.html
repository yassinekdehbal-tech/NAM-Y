<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMY — Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="arctic.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="utils.js"></script>
<script src="nav.js"></script>
<style>
/* ── DATE BAR ── */
.date-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 16px;
  background: var(--bg-surface); border-bottom: 1px solid var(--border);
}
.date-bar button {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-surface); color: var(--text-secondary); cursor: pointer;
  font-family: var(--font-body); font-size: 12px; font-weight: 500; transition: all .15s;
}
.date-bar button:hover { border-color: var(--accent); color: var(--accent); }
.date-bar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.date-bar input[type="date"] {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px; background: var(--bg-surface); color: var(--text-primary);
}

/* ── MAP ── */
.map-container { height: 45vh; position: relative; }
#map { width: 100%; height: 100%; }
.map-filter-overlay {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: rgba(255,255,255,.94); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  backdrop-filter: blur(8px); max-height: 40vh; overflow-y: auto;
  font-size: 12px; min-width: 180px;
}
.map-filter-overlay label {
  display: flex; align-items: center; gap: 6px; padding: 3px 0; cursor: pointer;
  color: var(--text-secondary);
}
.map-filter-overlay .filter-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* ── BOTTOM LAYOUT ── */
.bottom-layout { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 45vh - 56px - 48px); }
.tournees-col {
  background: var(--bg-surface); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.tournees-col-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.tournees-col-header h3 { font-size: 13px; font-weight: 600; }

.tournee-card {
  padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .12s; display: flex; align-items: center; gap: 10px;
}
.tournee-card:hover { background: var(--bg-hover); }
.tournee-card.active { border-left: 3px solid var(--accent); background: var(--accent-light); }
.tournee-color-bar { width: 4px; height: 36px; border-radius: 2px; flex-shrink: 0; }
.tournee-card-info { flex: 1; min-width: 0; }
.tournee-card-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tournee-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.tournee-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

/* ── LIVRAISONS ── */
.livraisons-col { overflow-y: auto; display: flex; flex-direction: column; }
.livraisons-header {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg-surface); flex-shrink: 0;
}
.livraisons-header h3 { font-size: 14px; font-weight: 600; }
.livraisons-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

.liv-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.liv-table th {
  position: sticky; top: 0; background: var(--bg-surface); border-bottom: 1px solid var(--border);
  padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
  z-index: 5;
}
.liv-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.liv-table tbody tr { cursor: grab; transition: background .1s; }
.liv-table tbody tr:hover { background: var(--bg-hover); }
.sortable-ghost { opacity: .4; }
.sortable-chosen { background: var(--accent-light); }

/* ── BADGES ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.badge-brouillon { background: var(--neutral-bg); color: var(--neutral); }
.badge-planifie { background: var(--info-bg); color: var(--info); }
.badge-publie { background: var(--accent-light); color: var(--accent-dark); }
.badge-en_cours { background: var(--warning-bg); color: var(--warning); }
.badge-livre { background: var(--success-bg); color: var(--success); }
.badge-annule { background: var(--danger-bg); color: var(--danger); }
.badge-incident { background: var(--danger-bg); color: var(--danger); }
.badge-nouveau { background: var(--info-bg); color: var(--info); }

/* ── MASS ASSIGN BAR ── */
.mass-bar {
  display: none; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--bg-surface); border-top: 1px solid var(--border); flex-shrink: 0;
}
.mass-bar.visible { display: flex; }
.mass-bar select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px;
}

/* ── BUTTONS ── */
.btn-sm {
  padding: 5px 12px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-dark); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--text-secondary); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-icon {
  background: none; border: none; cursor: pointer; color: var(--text-muted);
  padding: 4px; border-radius: 4px; font-size: 14px; transition: color .12s;
}
.btn-icon:hover { color: var(--accent); }

/* ── CREATE MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35);
  z-index: 2000; align-items: center; justify-content: center;
}
.modal-box {
  background: var(--bg-surface); border-radius: var(--radius-lg); padding: 24px;
  width: 420px; max-width: 92vw; box-shadow: var(--shadow-lg);
}
.modal-box h3 { margin-bottom: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.modal-field input, .modal-field select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 13px;
}
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.color-circle {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent;
  transition: border-color .12s, transform .12s;
}
.color-circle:hover { transform: scale(1.15); }
.color-circle.selected { border-color: var(--text-primary); transform: scale(1.15); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

/* ── TOAST ── */
#toast {
  display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-surface); border: 1px solid var(--border); border-left: 3px solid var(--accent);
  padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; z-index: 5000;
  box-shadow: var(--shadow-md);
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .bottom-layout { grid-template-columns: 1fr; }
  .tournees-col { display: none; }
  .map-container { height: 35vh; }
}
</style>
</head>
<body>

<!-- DATE BAR -->
<div class="date-bar">
  <button onclick="changeDate(-1)">&#8592;</button>
  <input type="date" id="datePicker" onchange="setDate(this.value)">
  <button onclick="changeDate(1)">&#8594;</button>
  <button id="btnAuj" onclick="goToday()">Auj.</button>
  <button id="btnDemain" onclick="goTomorrow()">Demain</button>
  <button id="btnToutes" onclick="toggleAllDates()">Toutes</button>
  <button class="btn-sm btn-accent" style="margin-left:auto" onclick="openGenerate()">🤖 Générer tournées</button>
</div>

<!-- MAP -->
<div class="map-container">
  <div id="map"></div>
  <div class="map-filter-overlay" id="mapFilters"></div>
</div>

<!-- BOTTOM: Tournees + Livraisons -->
<div class="bottom-layout">
  <!-- LEFT: Tournees Column -->
  <div class="tournees-col">
    <div class="tournees-col-header">
      <h3>Tournees</h3>
      <button class="btn-sm btn-accent" onclick="openCreateTournee()">+ Creer</button>
    </div>
    <div id="tourneesList"></div>
  </div>

  <!-- RIGHT: Livraisons Column -->
  <div class="livraisons-col">
    <div class="livraisons-header" id="livraisonsHeader">
      <h3 id="livraisonsTitle">EN ATTENTE</h3>
      <span class="badge badge-brouillon" id="livraisonsBadge"></span>
      <button class="btn-sm btn-accent" id="btnPublier" style="display:none" onclick="publierTournee()">PUBLIER</button>
      <span class="livraisons-count" id="livraisonsCount"></span>
    </div>
    <div style="flex:1;overflow-y:auto;">
      <table class="liv-table">
        <thead>
          <tr>
            <th style="width:30px"><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this.checked)"></th>
            <th>N&deg;</th>
            <th>Expediteur</th>
            <th>Destinataire</th>
            <th>Date / Creneau</th>
            <th>Marchandise</th>
            <th>Option</th>
            <th>Prix</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="livraisonsBody"></tbody>
      </table>
    </div>
    <div class="mass-bar" id="massBar">
      <span id="massCount">0 selectionnee(s)</span>
      <select id="massTarget"><option value="">Assigner a...</option></select>
      <button class="btn-sm btn-accent" onclick="massAssign()">Assigner</button>
    </div>
  </div>
</div>

<!-- CREATE TOURNEE MODAL -->
<div class="modal-overlay" id="modalCreateTournee">
  <div class="modal-box">
    <h3>Nouvelle tournee</h3>
    <div class="modal-field">
      <label>Nom</label>
      <input type="text" id="newTourneeName" placeholder="Ex: Tournee Paris Nord">
    </div>
    <div class="modal-field">
      <label>Chauffeur</label>
      <select id="newTourneeChauffeur"><option value="">-- Aucun --</option></select>
    </div>
    <div class="modal-field">
      <label>Couleur</label>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal('modalCreateTournee')">Annuler</button>
      <button class="btn-sm btn-accent" onclick="createTournee()">Creer</button>
    </div>
  </div>
</div>

<!-- PUBLISH TOURNEE MODAL -->
<div class="modal-overlay" id="modalPublish" style="display:none">
  <div class="modal-box" style="max-width:480px">
    <h3>Publier la tourn&eacute;e</h3>
    <div class="modal-field">
      <label>Nom de la tourn&eacute;e</label>
      <input type="text" id="pubName">
    </div>
    <div class="modal-field">
      <label>Livreur</label>
      <select id="pubChauffeur"></select>
    </div>
    <div class="modal-field">
      <label>Heure de d&eacute;part *</label>
      <input type="time" id="pubHeure" value="08:00">
    </div>
    <div id="pubSummary" style="background:var(--bg-page);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 16px;margin-top:8px;font-size:13px"></div>
    <div id="pubETADetail" style="max-height:200px;overflow-y:auto;margin-top:8px;font-size:12px"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-outline" onclick="closeModal('modalPublish')">Annuler</button>
      <button class="btn-sm btn-accent" onclick="confirmPublish()">PUBLIER</button>
    </div>
  </div>
</div>

<!-- GENERATE TOURNEES MODAL -->
<div class="modal-overlay" id="modalGenerate" style="display:none">
  <div class="modal-box" style="max-width:700px;max-height:85vh;overflow-y:auto">
    <h3>Génération automatique des tournées</h3>
    <div id="genParams" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--text-muted)"></div>
    <div id="genProgress" style="display:none;padding:16px;text-align:center">
      <div style="font-size:14px;font-weight:600;margin-bottom:8px">Analyse en cours...</div>
      <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div id="genBar" style="width:0%;height:100%;background:var(--accent);transition:width .3s"></div></div>
    </div>
    <div id="genPreview" style="display:none"></div>
    <div class="modal-actions" id="genActions">
      <button class="btn-sm btn-outline" onclick="closeModal('modalGenerate')">Annuler</button>
      <button class="btn-sm btn-accent" onclick="runGenerate()">Lancer la génération</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let selectedDate = sessionStorage.getItem('namy_dispatch_date') || getTomorrow();
let allDatesMode = false;
let commandes = [];
let tournees = [];
let chauffeursList = [];
let selectedTourneeId = null; // null = "EN ATTENTE"
let map = null;
let markers = {};
let pickupMarkers = {};
let checkedIds = new Set();
let sortableInstance = null;

const COLORS = ['#E74C3C','#3498DB','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E67E22','#34495E','#E91E63','#00BCD4'];
const STATUT_LABELS = {
  nouveau:'Nouveau', brouillon:'Brouillon', planifie:'Planifie', publie:'Publie',
  en_cours:'En cours', livre:'Livre', annule:'Annule', incident:'Incident'
};

// ═══════════════════════════════════════════════════════
//  DATE HELPERS
// ═══════════════════════════════════════════════════════
function getTomorrow() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}
function getToday() { return new Date().toISOString().slice(0, 10); }

function setDate(val) {
  allDatesMode = false;
  selectedDate = val;
  sessionStorage.setItem('namy_dispatch_date', val);
  loadData().then(renderAll);
}
function changeDate(offset) {
  const d = new Date(selectedDate);
  d.setDate(d.getDate() + offset);
  setDate(d.toISOString().slice(0, 10));
}
function goToday() { setDate(getToday()); }
function goTomorrow() { setDate(getTomorrow()); }
function toggleAllDates() {
  allDatesMode = !allDatesMode;
  if (allDatesMode) {
    document.getElementById('btnToutes').classList.add('active');
  } else {
    document.getElementById('btnToutes').classList.remove('active');
  }
  loadData().then(renderAll);
}

function updateDateBar() {
  document.getElementById('datePicker').value = selectedDate;
  const btnAuj = document.getElementById('btnAuj');
  const btnDem = document.getElementById('btnDemain');
  btnAuj.classList.toggle('active', selectedDate == getToday() && !allDatesMode);
  btnDem.classList.toggle('active', selectedDate == getTomorrow() && !allDatesMode);
}

// ═══════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════
async function loadData() {
  try {
    let q = db.from('expeditions').select('*').order('id', { ascending: false });
    if (!allDatesMode) q = q.eq('date_livraison', selectedDate);
    const { data: exps } = await q;
    commandes = (exps || []).map(e => ({ ...e }));

    let tq = db.from('tournees').select('*').order('heure_depart');
    if (!allDatesMode) tq = tq.eq('date_tournee', selectedDate);
    const { data: tours } = await tq;
    tournees = tours || [];

    const { data: ch } = await db.from('chauffeurs').select('*').eq('actif', true).order('prenom');
    chauffeursList = ch || [];
  } catch (e) {
    console.warn('Load failed:', e);
    showToast('Mode hors ligne', 'warning');
  }
}

// ═══════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════
function renderAll() {
  updateDateBar();
  renderTourneesList();
  renderLivraisons();
  renderMap();
  renderMapFilters();
  updateMassBar();
}

// ═══════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map').setView([48.856, 2.352], 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 19
  }).addTo(map);
}

function hashString(str) {
  let h = 0;
  for (let i = 0; i < (str || '').length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return Math.abs(h);
}

function getCommandeColor(cmd) {
  if (cmd.tournee_id) {
    const t = tournees.find(t => t.id == cmd.tournee_id);
    return t ? t.couleur : '#999';
  }
  return COLORS[hashString(cmd.exp_nom) % COLORS.length];
}

function makeSquareIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:' + color + ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

function makeCircleIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;border-radius:50%;background:' + color + ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

function buildPopup(cmd) {
  const statusBadge = '<span class="badge badge-' + (cmd.statut || 'nouveau') + '">' + (STATUT_LABELS[cmd.statut] || cmd.statut || 'Nouveau') + '</span>';
  let opts = '<option value="">Assigner...</option>';
  tournees.forEach(t => {
    const sel = cmd.tournee_id == t.id ? ' selected' : '';
    opts += '<option value="' + t.id + '"' + sel + '>' + (t.nom || 'Tournee') + '</option>';
  });
  return '<strong>' + (cmd.dest_nom || '-') + '</strong><br>' +
    (cmd.creneau || '') + ' &middot; ' + (cmd.poids_total || 0) + 'kg<br>' +
    statusBadge + '<br>' +
    '<select style="margin-top:6px;font-size:11px;padding:2px 4px" onchange="assignFromMap(\'' + cmd.id + '\',this.value)">' + opts + '</select>';
}

function renderMap() {
  // Clear existing markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  Object.values(pickupMarkers).forEach(m => map.removeLayer(m));
  markers = {};
  pickupMarkers = {};

  const bounds = [];
  commandes.forEach(cmd => {
    const color = getCommandeColor(cmd);

    // Delivery marker (circle)
    if (cmd.lat && cmd.lng) {
      const m = L.marker([cmd.lat, cmd.lng], { icon: makeCircleIcon(color) }).addTo(map);
      m.bindPopup(buildPopup(cmd));
      m._tourId = cmd.tournee_id;
      markers[cmd.id] = m;
      bounds.push([cmd.lat, cmd.lng]);
    }

    // Pickup marker (square)
    if (cmd.exp_lat && cmd.exp_lng) {
      const pm = L.marker([cmd.exp_lat, cmd.exp_lng], { icon: makeSquareIcon(color) }).addTo(map);
      pm.bindPopup('<strong>Enlevement</strong><br>' + (cmd.exp_nom || '-') + '<br>' + (cmd.exp_ville || ''));
      pm._tourId = cmd.tournee_id;
      pickupMarkers[cmd.id] = pm;
      bounds.push([cmd.exp_lat, cmd.exp_lng]);
    }
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  }
}

// ═══════════════════════════════════════════════════════
//  MAP FILTER OVERLAY
// ═══════════════════════════════════════════════════════
let mapFilterState = {}; // tournee_id or 'attente' => boolean (true = visible)

function renderMapFilters() {
  const box = document.getElementById('mapFilters');
  // Init filter state for new items
  if (mapFilterState['attente'] === undefined) mapFilterState['attente'] = true;
  tournees.forEach(t => { if (mapFilterState[t.id] === undefined) mapFilterState[t.id] = true; });

  let html = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px">Filtres carte</div>';
  html += '<label><input type="checkbox" ' + (mapFilterState['attente'] ? 'checked' : '') + ' onchange="toggleMapFilter(\'attente\',this.checked)"> ';
  html += '<span class="filter-dot" style="background:#999"></span> En attente</label>';
  tournees.forEach(t => {
    html += '<label><input type="checkbox" ' + (mapFilterState[t.id] ? 'checked' : '') + ' onchange="toggleMapFilter(\'' + t.id + '\',this.checked)"> ';
    html += '<span class="filter-dot" style="background:' + (t.couleur || '#999') + '"></span> ' + (t.nom || 'Tournee') + '</label>';
  });
  box.innerHTML = html;
}

function toggleMapFilter(key, visible) {
  mapFilterState[key] = visible;
  applyMapFilters();
}

function applyMapFilters() {
  commandes.forEach(cmd => {
    const fKey = cmd.tournee_id ? cmd.tournee_id : 'attente';
    const show = mapFilterState[fKey] !== false;
    if (markers[cmd.id]) {
      if (show) markers[cmd.id].addTo(map);
      else map.removeLayer(markers[cmd.id]);
    }
    if (pickupMarkers[cmd.id]) {
      if (show) pickupMarkers[cmd.id].addTo(map);
      else map.removeLayer(pickupMarkers[cmd.id]);
    }
  });
}

// ═══════════════════════════════════════════════════════
//  PUBLISH TOURNEE
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
//  HAVERSINE + ETA
// ═══════════════════════════════════════════════════════
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function calculateETAs(stops, heureDepart) {
  const VITESSE = 30; // km/h paramétrable
  const COEFF_ROUTE = 1.3;
  const [h, m] = (heureDepart || '08:00').split(':').map(Number);
  let minutes = h * 60 + m;
  let totalDistKm = 0;
  const etas = [];

  for (let i = 0; i < stops.length; i++) {
    // Temps de chargement
    if (i === 0) minutes += 20;
    else if (i < 5) minutes += 7;
    else minutes += 4;

    // Temps de route (depuis le stop précédent)
    if (i > 0) {
      const prev = stops[i-1];
      const curr = stops[i];
      const distKm = haversine(prev.lat||48.85, prev.lng||2.35, curr.lat||48.85, curr.lng||2.35) * COEFF_ROUTE;
      totalDistKm += distKm;
      minutes += (distKm / VITESSE) * 60;
    }

    // ETA arrivée
    const etaH = Math.floor(minutes / 60);
    const etaM = Math.round(minutes % 60);
    const eta = String(etaH).padStart(2,'0') + ':' + String(etaM).padStart(2,'0');

    // Temps de livraison
    const option = (stops[i].option_livraison || '').toLowerCase();
    const tempsLivraison = option.includes('trottoir') ? 7 : 15;
    minutes += tempsLivraison;

    etas.push({ ...stops[i], eta, stopIndex: i + 1 });
  }

  const totalMinutes = minutes - (h * 60 + m);
  return { etas, totalDistKm, totalMinutes };
}

async function confirmPublish() {
  if (!selectedTourneeId) return;
  const t = tournees.find(x => x.id == selectedTourneeId);
  if (!t) return;

  const newName = document.getElementById('pubName').value.trim() || t.nom;
  const newChauffeur = document.getElementById('pubChauffeur').value || t.chauffeur_id;
  const newHeure = document.getElementById('pubHeure').value || '08:00';

  // Calcul ETA final
  const stops = commandes.filter(c => c.tournee_id == selectedTourneeId);
  const { etas } = calculateETAs(stops, newHeure);

  try {
    // Update tournee
    await db.from('tournees').update({
      statut: 'publie', nom: newName, chauffeur_id: newChauffeur || null, heure_depart: newHeure
    }).eq('id', selectedTourneeId);

    // Update each expedition + save ETA
    for (const e of etas) {
      await db.from('expeditions').update({ statut: 'planifie' }).eq('id', e.id);
      await recordStatusChange(e.id, 'planifie', 'Tournee publiee — ETA ' + e.eta);

      // Save ETA in tournee_stops if exists, or just in expedition
      try {
        await db.from('tournee_stops').upsert({
          tournee_id: selectedTourneeId,
          expedition_id: e.id,
          ordre: e.stopIndex,
          eta: e.eta,
          nom: e.dest_nom,
          adresse: e.dest_adresse,
          cp: e.dest_cp,
          ville: e.dest_ville,
          lat: e.lat,
          lng: e.lng,
          creneau: e.creneau,
          option: e.option_livraison,
          poids: e.poids_total,
          tel: e.dest_telephone,
        }, { onConflict: 'tournee_id,expedition_id' });
      } catch(err) { console.warn('ETA save failed:', err); }
    }

    closeModal('modalPublish');
    await loadData();
    renderAll();
    showToast('Tournee "' + newName + '" publiee — ' + etas.length + ' stops avec ETA');
  } catch(e) {
    showToast('Erreur publication: ' + (e.message || e), 'warning');
  }
}

// ═══════════════════════════════════════════════════════
//  AI TOURNEE GENERATION
// ═══════════════════════════════════════════════════════
let dispatchParams = null;
let generatedTournees = [];

async function loadDispatchParams() {
  try {
    const { data } = await db.from('parametres_dispatch').select('*').eq('id', 1).single();
    dispatchParams = data || getDefaultParams();
  } catch(e) { dispatchParams = getDefaultParams(); }
}

function getDefaultParams() {
  return {
    duree_max_h: 8, distance_max_km: 150, distance_absolue_km: 200,
    vitesse_moyenne_kmh: 30, detour_max_retrait_km: 12, nb_max_retraits: 0,
    poids_max_colis_seul_kg: 30, poids_max_commande_seul_kg: 100,
    temps_chargement_1: 20, temps_chargement_2_5: 7, temps_chargement_6p: 4,
    temps_livraison_piece: 15, temps_livraison_trottoir: 7,
    methode_defaut: 'escargot', seuil_rentabilite_min: 0, rayon_regroupement_km: 12
  };
}

async function openGenerate() {
  await loadDispatchParams();
  const p = dispatchParams;
  document.getElementById('genParams').innerHTML =
    '<span>Durée max: ' + p.duree_max_h + 'h</span> · ' +
    '<span>Dist max: ' + p.distance_max_km + 'km</span> · ' +
    '<span>Méthode: ' + p.methode_defaut + '</span> · ' +
    '<span>Double équipage: >' + p.poids_max_colis_seul_kg + 'kg/colis</span>';
  document.getElementById('genProgress').style.display = 'none';
  document.getElementById('genPreview').style.display = 'none';
  document.getElementById('genPreview').innerHTML = '';
  generatedTournees = [];
  openModal('modalGenerate');
}

async function runGenerate() {
  const p = dispatchParams;
  const unassigned = commandes.filter(c => !c.tournee_id && c.statut != 'annule');
  if (!unassigned.length) { showToast('Aucune livraison à assigner', 'warning'); return; }

  document.getElementById('genProgress').style.display = 'block';
  document.getElementById('genBar').style.width = '10%';

  // Step 1: Flag double équipage
  unassigned.forEach(c => {
    c._doubleEquipage = false;
    if (c.poids_max_colis && c.poids_max_colis > p.poids_max_colis_seul_kg) c._doubleEquipage = true;
    if ((c.poids_total || 0) > p.poids_max_commande_seul_kg && (c.option_livraison || '').toLowerCase().includes('choix')) c._doubleEquipage = true;
  });

  document.getElementById('genBar').style.width = '30%';
  await new Promise(r => setTimeout(r, 200));

  // Step 2: Group by créneau then nearest neighbor
  const creneaux = [...new Set(unassigned.map(c => c.creneau || ''))].sort();
  const sorted = [];
  for (const cr of creneaux) {
    const group = unassigned.filter(c => (c.creneau || '') === cr);
    // Sort by method
    if (p.methode_defaut === 'ligne_sn') {
      group.sort((a, b) => (b.lat || 48.85) - (a.lat || 48.85)); // North to South
    } else if (p.methode_defaut === 'ligne_eo') {
      group.sort((a, b) => (a.lng || 2.35) - (b.lng || 2.35)); // East to West
    } else {
      // Escargot: nearest neighbor from center
      const centerLat = group.reduce((s, c) => s + (c.lat || 48.85), 0) / group.length;
      const centerLng = group.reduce((s, c) => s + (c.lng || 2.35), 0) / group.length;
      const remaining = [...group];
      const ordered = [];
      let current = { lat: centerLat, lng: centerLng };
      while (remaining.length) {
        let nearIdx = 0, nearDist = Infinity;
        for (let i = 0; i < remaining.length; i++) {
          const d = haversine(current.lat, current.lng, remaining[i].lat || 48.85, remaining[i].lng || 2.35);
          if (d < nearDist) { nearDist = d; nearIdx = i; }
        }
        current = remaining.splice(nearIdx, 1)[0];
        ordered.push(current);
      }
      group.length = 0;
      group.push(...ordered);
    }
    sorted.push(...group);
  }

  document.getElementById('genBar').style.width = '60%';
  await new Promise(r => setTimeout(r, 200));

  // Step 3: Build tournées with constraints
  generatedTournees = [];
  let current = { stops: [], totalDist: 0, totalMinutes: 0, totalCA: 0, isDouble: false };
  const maxMinutes = p.duree_max_h * 60;

  // Prioritize double équipage together
  const doubles = sorted.filter(c => c._doubleEquipage);
  const singles = sorted.filter(c => !c._doubleEquipage);
  const orderedAll = [...doubles, ...singles];

  for (const cmd of orderedAll) {
    // Estimate time for this stop
    const stopIdx = current.stops.length;
    let addMinutes = stopIdx === 0 ? p.temps_chargement_1 : (stopIdx < 5 ? p.temps_chargement_2_5 : p.temps_chargement_6p);
    addMinutes += (cmd.option_livraison || '').toLowerCase().includes('trottoir') ? p.temps_livraison_trottoir : p.temps_livraison_piece;

    if (current.stops.length > 0) {
      const prev = current.stops[current.stops.length - 1];
      const dist = haversine(prev.lat || 48.85, prev.lng || 2.35, cmd.lat || 48.85, cmd.lng || 2.35) * 1.3;
      addMinutes += (dist / p.vitesse_moyenne_kmh) * 60;
      current.totalDist += dist;
    }

    // Check constraints
    const wouldExceedTime = (current.totalMinutes + addMinutes) > maxMinutes;
    const wouldExceedDist = current.totalDist > p.distance_max_km;
    const switchDoubleType = current.stops.length > 0 && current.isDouble !== cmd._doubleEquipage && current.stops.length >= 3;

    if (wouldExceedTime || wouldExceedDist || switchDoubleType) {
      // Finalize current tournée
      if (current.stops.length > 0) {
        generatedTournees.push({ ...current });
      }
      current = { stops: [], totalDist: 0, totalMinutes: 0, totalCA: 0, isDouble: cmd._doubleEquipage };
    }

    current.stops.push(cmd);
    current.totalMinutes += addMinutes;
    current.totalCA += parseFloat(cmd.prix_ht || 0);
    if (cmd._doubleEquipage) current.isDouble = true;
  }
  if (current.stops.length > 0) generatedTournees.push(current);

  // Check rentability — merge isolated stops with nearest tournée
  if (p.seuil_rentabilite_min > 0) {
    generatedTournees = generatedTournees.filter(t => {
      if (t.totalCA >= p.seuil_rentabilite_min) return true;
      if (t.stops.length === 1 && generatedTournees.length > 1) {
        // Find nearest tournée and merge
        const stop = t.stops[0];
        let bestIdx = -1, bestDist = Infinity;
        generatedTournees.forEach((ot, i) => {
          if (ot === t) return;
          const lastStop = ot.stops[ot.stops.length - 1];
          const d = haversine(lastStop.lat || 48.85, lastStop.lng || 2.35, stop.lat || 48.85, stop.lng || 2.35);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        });
        if (bestIdx >= 0 && bestDist < p.rayon_regroupement_km) {
          generatedTournees[bestIdx].stops.push(stop);
          generatedTournees[bestIdx].totalCA += parseFloat(stop.prix_ht || 0);
          return false;
        }
      }
      return true;
    });
  }

  document.getElementById('genBar').style.width = '100%';
  await new Promise(r => setTimeout(r, 300));

  // Step 4: Render preview
  renderGeneratePreview();
}

function renderGeneratePreview() {
  document.getElementById('genProgress').style.display = 'none';
  const preview = document.getElementById('genPreview');
  preview.style.display = 'block';

  if (!generatedTournees.length) {
    preview.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted)">Aucune tournée générée</div>';
    return;
  }

  let html = '<div style="margin-bottom:8px;font-size:13px;font-weight:600">' + generatedTournees.length + ' tournée(s) générée(s)</div>';

  generatedTournees.forEach((t, i) => {
    const color = COLORS[i % COLORS.length];
    const doubleTag = t.isDouble ? ' <span style="background:#FEF9C3;color:#854D0E;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600">2 👤</span>' : '';
    html += '<div style="border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px;overflow:hidden">';
    html += '<div style="padding:10px 14px;background:' + color + '11;border-left:3px solid ' + color + ';display:flex;align-items:center;gap:8px">';
    html += '<strong style="font-size:13px">Tournée ' + (i + 1) + '</strong>' + doubleTag;
    html += '<span style="margin-left:auto;font-size:12px;color:var(--text-muted)">' + t.stops.length + ' stops · ' + t.totalDist.toFixed(1) + 'km · ' + Math.round(t.totalMinutes) + 'min · ' + t.totalCA.toFixed(0) + '€</span>';
    html += '</div>';
    html += '<div style="padding:6px 14px;font-size:12px">';
    t.stops.forEach((s, j) => {
      const doubleIcon = s._doubleEquipage ? ' <span title="Double équipage">2👤</span>' : '';
      html += '<div style="padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center">';
      html += '<span style="color:var(--text-muted);width:20px;text-align:right">' + (j+1) + '.</span>';
      html += '<span style="font-weight:500">' + (s.dest_nom || '') + '</span>' + doubleIcon;
      html += '<span style="color:var(--text-muted);margin-left:auto">' + (s.creneau || '') + ' · ' + (s.poids_total || 0) + 'kg</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  preview.innerHTML = html;

  // Update actions
  document.getElementById('genActions').innerHTML =
    '<button class="btn-sm btn-outline" onclick="closeModal(\'modalGenerate\')">Annuler</button>' +
    '<button class="btn-sm btn-outline" onclick="runGenerate()">Regénérer</button>' +
    '<button class="btn-sm btn-accent" onclick="applyGenerated()">Appliquer (' + generatedTournees.length + ' tournées)</button>';
}

async function applyGenerated() {
  if (!generatedTournees.length) return;

  for (let i = 0; i < generatedTournees.length; i++) {
    const gt = generatedTournees[i];
    const color = COLORS[i % COLORS.length];
    const nom = 'Tournee ' + (i + 1) + ' — ' + selectedDate;

    try {
      // Create tournée
      const { data: newT, error } = await db.from('tournees').insert({
        nom, date_tournee: selectedDate, heure_depart: '08:00',
        couleur: color, statut: 'brouillon'
      }).select().single();

      if (error || !newT) continue;

      // Assign expeditions
      for (const stop of gt.stops) {
        await db.from('expeditions').update({ tournee_id: newT.id }).eq('id', stop.id);
      }
    } catch(e) { console.warn('Apply generated failed:', e); }
  }

  closeModal('modalGenerate');
  await loadData();
  renderAll();
  showToast(generatedTournees.length + ' tournées créées et assignées');
  generatedTournees = [];
}

// ═══════════════════════════════════════════════════════
//  CREATE TOURNEE MODAL
// ═══════════════════════════════════════════════════════
let selectedColor = COLORS[0];

function openCreateTournee() {
  // Populate chauffeur select
  const sel = document.getElementById('newTourneeChauffeur');
  let opts = '<option value="">-- Aucun --</option>';
  chauffeursList.forEach(c => {
    opts += '<option value="' + c.id + '">' + c.prenom + ' ' + c.nom + '</option>';
  });
  sel.innerHTML = opts;

  // Populate color picker
  const picker = document.getElementById('colorPicker');
  picker.innerHTML = COLORS.map(c =>
    '<div class="color-circle' + (c == selectedColor ? ' selected' : '') + '" style="background:' + c + '" onclick="pickColor(\'' + c + '\')"></div>'
  ).join('');

  document.getElementById('newTourneeName').value = '';
  openModal('modalCreateTournee');
}

function pickColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-circle').forEach(el => {
    el.classList.toggle('selected', el.style.backgroundColor == c || rgbToHex(el.style.backgroundColor) == c.toUpperCase());
  });
}

function rgbToHex(rgb) {
  if (!rgb || rgb.startsWith('#')) return (rgb || '').toUpperCase();
  const m = rgb.match(/\d+/g);
  if (!m) return rgb;
  return '#' + m.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('').toUpperCase();
}

async function createTournee() {
  const nom = document.getElementById('newTourneeName').value.trim();
  if (!nom) { showToast('Nom requis', 'warning'); return; }
  const chauffeurId = document.getElementById('newTourneeChauffeur').value || null;

  const { error } = await db.from('tournees').insert({
    nom: nom,
    date_tournee: selectedDate,
    heure_depart: '08:00',
    couleur: selectedColor,
    chauffeur_id: chauffeurId,
    statut: 'brouillon'
  });

  if (error) { showToast('Erreur: ' + error.message, 'danger'); return; }

  closeModal('modalCreateTournee');
  await loadData();
  renderAll();
  showToast('Tournee creee', 'success');
}
