<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAMY TMS — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="arctic.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="utils.js"></script>
  <script src="nav.js"></script>
  <style>
    /* ─── CHAT LAYOUT ─────────────────────────────────────────── */
    .chat-layout {
      display: grid;
      grid-template-columns: 30% 70%;
      height: calc(100vh - 52px);
      overflow: hidden;
    }

    /* ─── CONVERSATION LIST (LEFT) ────────────────────────────── */
    .conv-panel {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .conv-toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .conv-toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .conv-toolbar h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }

    .conv-search {
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 12px;
      background: var(--bg-page);
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s;
    }
    .conv-search:focus { border-color: var(--accent); }
    .conv-search::placeholder { color: var(--text-hint); }

    .conv-filters {
      display: flex;
      gap: 4px;
    }

    .conv-filter-btn {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-page);
      cursor: pointer;
      transition: all .2s;
    }
    .conv-filter-btn:hover { background: var(--bg-hover); }
    .conv-filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-new-conv {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s;
    }
    .btn-new-conv:hover { background: var(--accent-dark); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
    }

    .conv-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      transition: background .15s;
      border-left: 3px solid transparent;
    }
    .conv-item:hover { background: var(--bg-hover); }
    .conv-item.active {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
    }

    .conv-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-active);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .conv-body {
      flex: 1;
      min-width: 0;
    }

    .conv-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .conv-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-time {
      font-size: 10px;
      color: var(--text-hint);
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .conv-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-top: 3px;
    }

    .conv-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .conv-badge {
      background: var(--danger);
      color: #fff;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: 600;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    .conv-canal {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-hint);
      font-weight: 500;
    }
    .conv-canal.whatsapp { color: #25D366; }

    .conv-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ─── MESSAGE PANEL (RIGHT) ───────────────────────────────── */
    .msg-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-page);
      overflow: hidden;
    }

    .msg-header {
      padding: 12px 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
    }

    .msg-header-back {
      display: none;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-secondary);
      padding: 4px;
    }

    .msg-header-info { flex: 1; }
    .msg-header-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .msg-header-status {
      font-size: 11px;
      color: var(--text-muted);
    }

    .msg-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-hint);
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    .msg-date-sep {
      text-align: center;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-hint);
      padding: 8px 0;
    }

    .msg-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      position: relative;
      word-wrap: break-word;
    }

    .msg-left {
      align-self: flex-start;
      background: var(--bg-hover);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .msg-right {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-ia {
      align-self: flex-end;
      background: linear-gradient(135deg, #7C3AED, #00C9A7);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-photo {
      padding: 4px;
    }
    .msg-photo img {
      max-width: 240px;
      border-radius: 10px;
      display: block;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-hint);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg-right .msg-meta,
    .msg-ia .msg-meta {
      color: rgba(255,255,255,.65);
      justify-content: flex-end;
    }

    .msg-badge-ia {
      background: #7C3AED;
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: var(--radius-pill);
      letter-spacing: .3px;
    }

    .msg-typing {
      align-self: flex-start;
      padding: 10px 18px;
      background: var(--bg-hover);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      display: none;
    }
    .msg-typing.visible { display: flex; }
    .msg-typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      display: inline-block;
      margin: 0 2px;
      animation: typing-dot 1.2s infinite;
    }
    .msg-typing span:nth-child(2) { animation-delay: .2s; }
    .msg-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes typing-dot {
      0%, 60%, 100% { opacity: .3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ─── CHAT INPUT BAR ──────────────────────────────────────── */
    .chat-input {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input textarea {
      flex: 1;
      height: 40px;
      max-height: 100px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-page);
      outline: none;
      resize: none;
      line-height: 1.4;
      transition: border-color .2s;
    }
    .chat-input textarea:focus { border-color: var(--accent); }
    .chat-input textarea::placeholder { color: var(--text-hint); }

    .chat-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all .2s;
      flex-shrink: 0;
    }

    .chat-btn-send {
      background: var(--accent);
      color: #fff;
    }
    .chat-btn-send:hover { background: var(--accent-dark); }

    .chat-btn-ai {
      background: linear-gradient(135deg, #7C3AED, #00C9A7);
      color: #fff;
    }
    .chat-btn-ai:hover { opacity: .85; }

    .chat-btn-photo {
      background: var(--bg-active);
      color: var(--text-secondary);
    }
    .chat-btn-photo:hover { background: var(--border); }

    /* ─── NEW CONVERSATION MODAL ──────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,25,35,.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 400px;
      max-width: 92vw;
      padding: 24px;
    }

    .modal-box h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 16px;
    }

    .modal-box label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .modal-box select,
    .modal-box input[type="text"] {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-page);
      outline: none;
      margin-bottom: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .modal-actions button {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-cancel {
      background: var(--bg-page);
      color: var(--text-secondary);
    }
    .btn-cancel:hover { background: var(--bg-hover); }

    .btn-confirm {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-confirm:hover { background: var(--accent-dark); }

    /* ─── TOAST ────────────────────────────────────────────────── */
    #toast {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-surface);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      font-size: 13px;
      z-index: 2000;
      border-left: 3px solid var(--success);
    }

    /* ─── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .chat-layout {
        grid-template-columns: 1fr;
      }
      .conv-panel {
        display: flex;
      }
      .msg-panel {
        display: none;
      }
      .chat-layout.conv-open .conv-panel { display: none; }
      .chat-layout.conv-open .msg-panel { display: flex; }
      .msg-header-back { display: flex; }
      .msg-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
  <!-- NAV injected by nav.js -->
  <div id="toast"></div>

  <div class="chat-layout" id="chatLayout">
    <!-- ─── LEFT: CONVERSATIONS ───────────────────────────────── -->
    <div class="conv-panel">
      <div class="conv-toolbar">
        <div class="conv-toolbar-row">
          <h2>Conversations</h2>
          <button class="btn-new-conv" onclick="openModal('modal-new-conv')" title="Nouvelle conversation">+</button>
        </div>
        <input type="text" class="conv-search" id="convSearch" placeholder="Rechercher un magasin..." oninput="renderConversations()">
        <div class="conv-filters">
          <button class="conv-filter-btn active" data-filter="all" onclick="setFilter('all')">Tous</button>
          <button class="conv-filter-btn" data-filter="unread" onclick="setFilter('unread')">Non lus</button>
          <button class="conv-filter-btn" data-filter="whatsapp" onclick="setFilter('whatsapp')">WhatsApp</button>
        </div>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- ─── RIGHT: MESSAGES ───────────────────────────────────── -->
    <div class="msg-panel" id="msgPanel">
      <div class="msg-header" id="msgHeader">
        <button class="msg-header-back" onclick="goBackToList()" title="Retour">&#8592;</button>
        <div class="msg-header-info">
          <div class="msg-header-name" id="msgHeaderName">Sélectionnez une conversation</div>
          <div class="msg-header-status" id="msgHeaderStatus"></div>
        </div>
      </div>
      <div class="msg-area" id="msgArea">
        <div class="msg-placeholder">Choisissez une conversation pour commencer</div>
      </div>
      <div class="msg-typing" id="msgTyping">
        <span></span><span></span><span></span>
      </div>
      <div class="chat-input" id="chatInputBar" style="display:none;">
        <textarea id="chat-input" placeholder="Votre message..." rows="1"></textarea>
        <button class="chat-btn chat-btn-photo" onclick="uploadPhoto()" title="Photo">&#128247;</button>
        <button class="chat-btn chat-btn-ai" onclick="generateAIResponse()" title="Réponse IA">&#9733;</button>
        <button class="chat-btn chat-btn-send" onclick="sendMessage()" title="Envoyer">&#10148;</button>
      </div>
    </div>
  </div>

  <!-- ─── MODAL: NEW CONVERSATION ──────────────────────────── -->
  <div class="modal-overlay" id="modal-new-conv">
    <div class="modal-box">
      <h3>Nouvelle conversation</h3>
      <label for="newConvEntreprise">Entreprise / Magasin</label>
      <select id="newConvEntreprise">
        <option value="">Chargement...</option>
      </select>
      <label for="newConvMessage">Premier message (optionnel)</label>
      <input type="text" id="newConvMessage" placeholder="Bonjour...">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('modal-new-conv')">Annuler</button>
        <button class="btn-confirm" onclick="createConversation()">Créer la conversation</button>
      </div>
    </div>
  </div>

  <script>
  /* ═══════════════════════════════════════════════════════════════
     NAMY CHAT — State & Logic
     ═══════════════════════════════════════════════════════════════ */
  let conversations = [];
  let messages = [];
  let activeConvId = null;
  let filterMode = 'all'; // all | unread | whatsapp

  // ─── INIT ──────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    await loadConversations();
    await loadEntreprises();
    initRealtime();
    setupKeyboard();
  });

  // ─── LOAD CONVERSATIONS ───────────────────────────────────
  async function loadConversations() {
    const { data, error } = await db
      .from('conversations')
      .select('*')
      .order('dernier_message_at', { ascending: false });
    conversations = data || [];
    renderConversations();
  }

  // ─── RENDER CONVERSATIONS ─────────────────────────────────
  function renderConversations() {
    const container = document.getElementById('convList');
    const search = (document.getElementById('convSearch').value || '').toLowerCase().trim();

    let filtered = conversations;

    // Apply filter
    if (filterMode === 'unread') {
      filtered = filtered.filter(c => (c.non_lus_namy || 0) > 0);
    } else if (filterMode === 'whatsapp') {
      filtered = filtered.filter(c => (c.canal || '').toLowerCase() === 'whatsapp');
    }

    // Apply search
    if (search) {
      filtered = filtered.filter(c =>
        (c.entreprise_nom || '').toLowerCase().includes(search) ||
        (c.dernier_message || '').toLowerCase().includes(search)
      );
    }

    if (filtered.length === 0) {
      container.innerHTML = '<div class="conv-empty">Aucune conversation</div>';
      return;
    }

    container.innerHTML = filtered.map(c => {
      const isActive = c.id == activeConvId;
      const initials = (c.entreprise_nom || '??').substring(0, 2).toUpperCase();
      const unread = c.non_lus_namy || 0;
      const canal = c.canal || 'sms';
      const timeStr = c.dernier_message_at ? formatTimeAgo(c.dernier_message_at) : '';
      const preview = c.dernier_message || 'Aucun message';

      return `
        <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectConversation('${c.id}')">
          <div class="conv-avatar">${initials}</div>
          <div class="conv-body">
            <div class="conv-header">
              <span class="conv-name">${escapeHtml(c.entreprise_nom || 'Sans nom')}</span>
              <span class="conv-time">${timeStr}</span>
            </div>
            <div class="conv-footer">
              <span class="conv-preview">${escapeHtml(preview)}</span>
              ${unread > 0 ? `<span class="conv-badge">${unread}</span>` : ''}
            </div>
            <span class="conv-canal ${canal.toLowerCase() === 'whatsapp' ? 'whatsapp' : ''}">${escapeHtml(canal)}</span>
          </div>
        </div>`;
    }).join('');
  }

  // ─── FILTER ────────────────────────────────────────────────
  function setFilter(mode) {
    filterMode = mode;
    document.querySelectorAll('.conv-filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === mode);
    });
    renderConversations();
  }

  // ─── SELECT CONVERSATION ──────────────────────────────────
  async function selectConversation(id) {
    activeConvId = id;
    const layout = document.getElementById('chatLayout');
    layout.classList.add('conv-open');
    document.getElementById('chatInputBar').style.display = 'flex';

    // Mark as read
    await db.from('conversations').update({ non_lus_namy: 0 }).eq('id', id);

    // Update local state
    const conv = conversations.find(c => c.id == id);
    if (conv) conv.non_lus_namy = 0;

    // Load messages
    const { data } = await db
      .from('messages')
      .select('*')
      .eq('conversation_id', id)
      .order('created_at', { ascending: true });
    messages = data || [];

    renderHeader();
    renderMessages();
    renderConversations();
  }

  // ─── RENDER HEADER ─────────────────────────────────────────
  function renderHeader() {
    const conv = conversations.find(c => c.id == activeConvId);
    document.getElementById('msgHeaderName').textContent = conv?.entreprise_nom || 'Conversation';
    const canal = conv?.canal || '';
    const status = canal ? `Canal : ${canal}` : '';
    document.getElementById('msgHeaderStatus').textContent = status;
  }

  // ─── RENDER MESSAGES ──────────────────────────────────────
  function renderMessages() {
    const area = document.getElementById('msgArea');
    if (messages.length === 0) {
      area.innerHTML = '<div class="msg-placeholder">Aucun message pour le moment</div>';
      return;
    }

    let html = '';
    let lastDate = '';

    messages.forEach(m => {
      // Date separator
      const msgDate = m.created_at ? new Date(m.created_at).toLocaleDateString('fr-FR') : '';
      if (msgDate && msgDate !== lastDate) {
        lastDate = msgDate;
        html += `<div class="msg-date-sep">${msgDate}</div>`;
      }

      const role = (m.auteur_role || '').toLowerCase();
      const isRight = ['admin', 'dispatcher', 'ia', 'namy'].includes(role);
      const isIA = role === 'ia';
      const bubbleClass = isIA ? 'msg-ia' : (isRight ? 'msg-right' : 'msg-left');
      const isPhoto = m.type === 'photo';
      const timeStr = m.created_at ? new Date(m.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) : '';

      let content = '';
      if (isPhoto) {
        content = `<div class="msg-photo"><img src="${escapeHtml(m.contenu || '')}" alt="Photo" loading="lazy"></div>`;
      } else {
        content = escapeHtml(m.contenu || '').replace(/\n/g, '<br>');
      }

      html += `
        <div class="msg-bubble ${bubbleClass} ${isPhoto ? 'msg-photo' : ''}">
          ${content}
          <div class="msg-meta">
            ${isIA ? '<span class="msg-badge-ia">IA</span>' : ''}
            <span>${escapeHtml(m.auteur_nom || role)}</span>
            <span>${timeStr}</span>
          </div>
        </div>`;
    });

    area.innerHTML = html;
    area.scrollTop = area.scrollHeight;
  }

  // ─── SEND MESSAGE ─────────────────────────────────────────
  async function sendMessage() {
    const textarea = document.getElementById('chat-input');
    const text = textarea.value.trim();
    if (!text || !activeConvId) return;
    textarea.value = '';
    textarea.style.height = '40px';

    const user = getSessionUser();
    const msg = {
      conversation_id: activeConvId,
      auteur_id: user?.auth_id || null,
      auteur_nom: user ? (user.prenom + ' ' + user.nom).trim() : 'NAMY',
      auteur_role: user?.role || 'admin',
      contenu: text,
      type: 'texte',
      lu_par_namy: true
    };

    const { error } = await db.from('messages').insert(msg);
    if (error) {
      showToast('Erreur envoi message', 'danger');
      return;
    }

    await db.from('conversations').update({
      dernier_message: text.substring(0, 120),
      dernier_message_at: new Date().toISOString()
    }).eq('id', activeConvId);
  }

  // ─── AI RESPONSE ──────────────────────────────────────────
  async function generateAIResponse() {
    if (!activeConvId) return;
    const conv = conversations.find(c => c.id == activeConvId);

    // Fetch recent expeditions for context
    let expeditions = [];
    if (conv?.entreprise_id) {
      const { data } = await db
        .from('expeditions')
        .select('id, destinataire, statut, date, creneau')
        .eq('entreprise_id', conv.entreprise_id)
        .order('created_at', { ascending: false })
        .limit(5);
      expeditions = data || [];
    }

    // Build context
    const context = `Magasin: ${conv?.entreprise_nom || 'Inconnu'}
Expeditions recentes:
${expeditions.map(e => `- #${e.id}: ${e.destinataire} | ${e.statut} | ${e.date} ${e.creneau || ''}`).join('\n') || 'Aucune'}

Derniers messages:
${messages.slice(-5).map(m => `[${m.auteur_role}] ${m.contenu}`).join('\n')}`;

    showTypingIndicator();

    // Placeholder AI response (in production, call an Edge Function with Claude)
    await new Promise(r => setTimeout(r, 1200));

    let aiResponse = '';
    if (expeditions.length > 0) {
      aiResponse = `Bonjour ! Je suis l'assistant NAMY. Je vois que ${conv?.entreprise_nom || 'votre magasin'} a ${expeditions.length} expedition(s) recente(s). Comment puis-je vous aider ?`;
    } else {
      aiResponse = `Bonjour ! Je suis l'assistant NAMY pour ${conv?.entreprise_nom || 'votre magasin'}. Comment puis-je vous aider ?`;
    }

    hideTypingIndicator();

    const textarea = document.getElementById('chat-input');
    textarea.value = aiResponse;
    textarea.focus();
    autoResizeTextarea(textarea);
    showToast("Reponse IA generee — modifiez-la avant d'envoyer", 'info');
  }

  // ─── PHOTO UPLOAD ─────────────────────────────────────────
  async function uploadPhoto() {
    if (!activeConvId) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const fileName = `chat_${activeConvId}_${Date.now()}.jpg`;
      try {
        const { error: upErr } = await db.storage.from('delivery-photos').upload(fileName, file);
        if (upErr) throw upErr;
        const { data: urlData } = db.storage.from('delivery-photos').getPublicUrl(fileName);
        const url = urlData.publicUrl;

        const user = getSessionUser();
        await db.from('messages').insert({
          conversation_id: activeConvId,
          auteur_id: user?.auth_id || null,
          auteur_nom: user ? (user.prenom + ' ' + user.nom).trim() : 'NAMY',
          auteur_role: user?.role || 'admin',
          contenu: url,
          type: 'photo',
          lu_par_namy: true
        });

        await db.from('conversations').update({
          dernier_message: '[Photo]',
          dernier_message_at: new Date().toISOString()
        }).eq('id', activeConvId);
      } catch (err) {
        console.error(err);
        showToast('Erreur upload photo', 'warning');
      }
    };
    input.click();
  }

  // ─── REALTIME ─────────────────────────────────────────────
  function initRealtime() {
    db.channel('chat-messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
        if (payload.new.conversation_id == activeConvId) {
          // Avoid duplicates
          if (!messages.find(m => m.id === payload.new.id)) {
            messages.push(payload.new);
            renderMessages();
          }
        }
        loadConversations();
      })
      .subscribe();

    db.channel('chat-conversations')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'conversations' }, () => {
        loadConversations();
      })
      .subscribe();
  }

  // ─── NEW CONVERSATION ─────────────────────────────────────
  async function loadEntreprises() {
    const { data } = await db.from('entreprises').select('id, nom').order('nom');
    const select = document.getElementById('newConvEntreprise');
    select.innerHTML = '<option value="">-- Choisir une entreprise --</option>';
    (data || []).forEach(e => {
      select.innerHTML += `<option value="${e.id}">${escapeHtml(e.nom)}</option>`;
    });
  }

  async function createConversation() {
    const entId = document.getElementById('newConvEntreprise').value;
    if (!entId) { showToast('Veuillez choisir une entreprise', 'warning'); return; }

    const select = document.getElementById('newConvEntreprise');
    const entNom = select.options[select.selectedIndex].text;
    const firstMsg = document.getElementById('newConvMessage').value.trim();

    const { data: conv, error } = await db.from('conversations').insert({
      entreprise_id: entId,
      entreprise_nom: entNom,
      canal: 'web',
      non_lus_namy: 0,
      non_lus_client: firstMsg ? 1 : 0,
      dernier_message: firstMsg || null,
      dernier_message_at: new Date().toISOString()
    }).select().single();

    if (error || !conv) {
      showToast('Erreur creation conversation', 'danger');
      return;
    }

    // Send first message if provided
    if (firstMsg) {
      const user = getSessionUser();
      await db.from('messages').insert({
        conversation_id: conv.id,
        auteur_id: user?.auth_id || null,
        auteur_nom: user ? (user.prenom + ' ' + user.nom).trim() : 'NAMY',
        auteur_role: user?.role || 'admin',
        contenu: firstMsg,
        type: 'texte',
        lu_par_namy: true
      });
    }

    closeModal('modal-new-conv');
    document.getElementById('newConvMessage').value = '';
    await loadConversations();
    selectConversation(conv.id);
    showToast('Conversation creee');
  }

  // ─── TYPING INDICATOR ─────────────────────────────────────
  function showTypingIndicator() {
    document.getElementById('msgTyping').classList.add('visible');
    const area = document.getElementById('msgArea');
    area.scrollTop = area.scrollHeight;
  }

  function hideTypingIndicator() {
    document.getElementById('msgTyping').classList.remove('visible');
  }

  // ─── KEYBOARD ─────────────────────────────────────────────
  function setupKeyboard() {
    const textarea = document.getElementById('chat-input');

    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    textarea.addEventListener('input', () => {
      autoResizeTextarea(textarea);
    });
  }

  function autoResizeTextarea(el) {
    el.style.height = '40px';
    if (el.scrollHeight > 40) {
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }
  }

  // ─── MOBILE BACK ──────────────────────────────────────────
  function goBackToList() {
    activeConvId = null;
    document.getElementById('chatLayout').classList.remove('conv-open');
    document.getElementById('chatInputBar').style.display = 'none';
    document.getElementById('msgArea').innerHTML = '<div class="msg-placeholder">Choisissez une conversation pour commencer</div>';
    document.getElementById('msgHeaderName').textContent = 'Selectionnez une conversation';
    document.getElementById('msgHeaderStatus').textContent = '';
    renderConversations();
  }

  // ─── HELPERS ──────────────────────────────────────────────
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTimeAgo(dateStr) {
    const now = new Date();
    const d = new Date(dateStr);
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    const diffH = Math.floor(diffMs / 3600000);
    const diffD = Math.floor(diffMs / 86400000);

    if (diffMin < 1) return 'maintenant';
    if (diffMin < 60) return diffMin + ' min';
    if (diffH < 24) return diffH + 'h';
    if (diffD < 7) return diffD + 'j';
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
  }
  </script>
</body>
