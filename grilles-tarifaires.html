
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMY — Grilles tarifaires</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="utils.js"></script>
<style>
:root{--bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border:#dddbd2;--text:#1a1a18;--muted:#6b6960;--dim:#a8a69e;--accent:#1a472a;--al:#eaf2ec;--accent2:#c47a1a;--a2l:#fef3e2;--danger:#c43a2a;--dl:#fef0ee;--info:#1a5c8c;--il:#e8f2fb;--purple:#6d28d9;--pl:#f0eeff;--warn:#b45309;--wl:#fffbeb;--r:8px;--rl:14px;--sh:0 1px 4px rgba(0,0,0,.07);--shl:0 8px 32px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hdr{background:var(--text);height:52px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:5px;color:#fff}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.5)}
.hdr-act{margin-left:auto;display:flex;gap:8px}
.layout{display:grid;grid-template-columns:270px 1fr;height:calc(100vh - 52px)}
.sb{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.gl{flex:1;overflow-y:auto;padding:8px}
.gi{padding:12px 14px;border-radius:var(--r);cursor:pointer;transition:all .15s;margin-bottom:4px;border:1.5px solid transparent}
.gi:hover{background:var(--surface2)}
.gi.on{background:var(--al);border-color:rgba(26,71,42,.2)}
.gi-nm{font-size:13px;font-weight:600;margin-bottom:2px}
.gi-mt{font-size:11.5px;color:var(--muted);margin-bottom:4px}
.gi-tg{display:flex;gap:4px;flex-wrap:wrap}
.tbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.t-poids{background:var(--il);color:var(--info)}
.t-zone{background:var(--al);color:var(--accent)}
.t-colis{background:var(--a2l);color:var(--accent2)}
.main{overflow-y:auto;display:flex;flex-direction:column}
.gtabs{border-bottom:1px solid var(--border);background:var(--surface);display:flex;padding:0 24px;position:sticky;top:0;z-index:10;flex-shrink:0}
.gtab{padding:13px 16px;background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.gtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.gtab:hover:not(.on){color:var(--text)}
.tp{display:none;padding:24px;flex-direction:column;gap:20px}
.tp.on{display:flex}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.ch{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.ct{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.cs{font-size:12px;color:var(--muted);font-weight:400;font-family:'DM Sans',sans-serif}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;background:var(--surface2);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,0,0,.015)}
.mn{font-family:'DM Mono',monospace;font-weight:600}
.c-p{color:var(--info)}.c-l{color:var(--accent)}.c-t1{color:var(--info)}.c-t2{color:var(--accent)}.c-t3{color:var(--purple)}.c-km{color:var(--accent2);font-style:italic}
.bdg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-family:'DM Mono',monospace;font-weight:600}
.b-p{background:var(--il);color:var(--info)}.b-d{background:var(--surface2);color:var(--muted)}
.bz{padding:3px 10px;border-radius:4px;font-weight:700;font-size:12px}
.z-a{background:#dbeafe;color:#1d4ed8}.z-b{background:#d1fae5;color:#065f46}.z-c{background:#fef9c3;color:#854d0e}.z-d{background:#ffe4e6;color:#9f1239}.z-e{background:#f3e8ff;color:#6b21a8}
.tgl{width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;display:inline-block;vertical-align:middle}
.tgl.on{background:var(--accent)}
.tgl::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{left:19px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:16px}
.pc{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .15s}
.pc.on{border-color:rgba(26,71,42,.3);background:var(--al)}
.pc-cl{font-size:13px;font-weight:600;margin-bottom:2px}
.pc-mt{font-size:11.5px;color:var(--muted)}
.pc-tg{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.pb{font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px}
.pb-d{background:var(--wl);color:var(--warn);border:1px solid rgba(180,83,9,.2)}
.pb-a{background:var(--al);color:var(--accent);border:1px solid rgba(26,71,42,.2)}
.sim-top{background:var(--text);padding:14px 20px;display:flex;align-items:center;gap:10px}
.sim-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}
.sim-body{padding:20px;display:flex;flex-direction:column;gap:16px}
.sim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.fc{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:border-color .15s;width:100%}
.fc:focus{border-color:var(--accent);background:#fff}
.fcks{display:flex;gap:8px;flex-wrap:wrap}
.fck{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;font-size:12.5px;cursor:pointer;transition:all .15s;user-select:none}
.fck.on{background:var(--al);border-color:rgba(26,71,42,.3);color:var(--accent);font-weight:600}
.srp{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px}
.sls{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.sl{display:flex;justify-content:space-between;font-size:13px}
.sl span:first-child{color:var(--muted)}
.sl.sep{border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-weight:600}
.sl.sep span:first-child{color:var(--text)}
.stb{background:var(--accent);color:#fff;border-radius:var(--r);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.stl{font-size:13px;font-weight:600}.std{font-size:11.5px;opacity:.65;margin-top:2px}.stv{font-family:'DM Mono',monospace;font-size:30px;font-weight:700}
.warn-b{background:var(--wl);border:1px solid rgba(180,83,9,.2);border-radius:var(--r);padding:12px 16px;color:var(--warn);font-size:13px;display:flex;align-items:center;gap:8px}
.info-b{background:var(--il);border:1px solid rgba(26,92,140,.2);border-radius:var(--r);padding:10px 16px;color:var(--info);font-size:12.5px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.bp{background:var(--accent);color:#fff}.bp:hover{background:#143d22}
.bg{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}.bg:hover{color:var(--text);border-color:var(--muted)}
.bd{background:var(--dl);color:var(--danger);border:1px solid rgba(196,58,42,.15)}.bd:hover{background:var(--danger);color:#fff}
.bs{padding:5px 10px;font-size:12px}.bxs{padding:3px 8px;font-size:11px;border-radius:5px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mt{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.mc{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:4px}
.mc:hover{background:var(--surface2)}
.mb{padding:20px;display:flex;flex-direction:column;gap:14px}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pt{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.ps{font-size:13px;color:var(--muted);margin-top:2px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;border-radius:var(--r);padding:10px 18px;font-size:13px;z-index:9999;box-shadow:var(--shl);display:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo">N A M Y</div>
  <span class="hdr-sub">/ Grilles tarifaires</span>
  <div class="hdr-act">
    <button class="btn bg bs" style="color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.15)" onclick="showModal('mn')">+ Nouvelle grille</button>
  </div>
</header>
<div class="layout">
  <div class="sb">
    <div class="sb-hd"><span class="sb-title">Grilles tarifaires</span><button class="btn bp bs" style="padding:3px 10px;font-size:11px" onclick="showModal('mn')">+</button></div>
    <div class="gl" id="gl"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- Modal nouvelle grille -->
<div class="mo" id="mn" style="display:none">
  <div class="md">
    <div class="mh"><span class="mt">Nouvelle grille tarifaire</span><button class="mc" onclick="hideModal('mn')">&#10005;</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">Nom *</label><input type="text" class="fc" id="nn-n" placeholder="Ex: TRUFFAUT STANDARD"></div>
      <div class="fg"><label class="fl">Type de calcul *</label>
        <select class="fc" id="nn-t">
          <option value="poids">&#9878;&#65039; Poids + Dimensions</option>
          <option value="zone">&#128205; Zone g&eacute;ographique + V&eacute;hicule</option>
          <option value="colis">&#128230; Nombre de colis / Cat&eacute;gorie</option>
        </select>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Rayon inclus (km)</label><input type="number" class="fc" id="nn-r" value="30"></div>
        <div class="fg"><label class="fl">Majoration dim/f&eacute;ri&eacute;s (%)</label><input type="number" class="fc" id="nn-m" value="20"></div>
      </div>
    </div>
    <div class="mf"><button class="btn bg" onclick="hideModal('mn')">Annuler</button><button class="btn bp" onclick="createGrille()">Cr&eacute;er</button></div>
  </div>
</div>

<!-- Modal ligne poids -->
<div class="mo" id="mp" style="display:none">
  <div class="md">
    <div class="mh"><span class="mt">Ajouter une ligne — Poids</span><button class="mc" onclick="hideModal('mp')">&#10005;</button></div>
    <div class="mb">
      <div class="fr">
        <div class="fg"><label class="fl">Poids min (kg) &ge;</label><input type="number" class="fc" id="lp-a" value="0"></div>
        <div class="fg"><label class="fl">Poids max (kg) &lt;</label><input type="number" class="fc" id="lp-b" placeholder="Ex: 200"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Poids colis max (kg)</label><input type="number" class="fc" id="lp-c" placeholder="Ex: 130"></div>
        <div class="fg"><label class="fl">Dimension max (cm)</label><input type="number" class="fc" id="lp-d" placeholder="Ex: 320"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Prix Pied camion (&euro;HT)</label><input type="number" class="fc" id="lp-e" step="0.01"></div>
        <div class="fg"><label class="fl">Prix Lieu du choix (&euro;HT)</label><input type="number" class="fc" id="lp-f" step="0.01"></div>
      </div>
    </div>
    <div class="mf"><button class="btn bg" onclick="hideModal('mp')">Annuler</button><button class="btn bp" onclick="addLignePoids()">Ajouter</button></div>
  </div>
</div>

<!-- Modal categorie colis -->
<div class="mo" id="mc2" style="display:none">
  <div class="md">
    <div class="mh"><span class="mt">Ajouter une cat&eacute;gorie de colis</span><button class="mc" onclick="hideModal('mc2')">&#10005;</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">Nom de la cat&eacute;gorie *</label><input type="text" class="fc" id="lc-n" placeholder="Ex: LITERIE, ELECTROM&Eacute;NAGER"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Nb colis min (&ge;)</label><input type="number" class="fc" id="lc-a" value="1"></div>
        <div class="fg"><label class="fl">Nb colis max (&lt;)</label><input type="number" class="fc" id="lc-b" placeholder="Ex: 5"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Prix de base (&euro;HT)</label><input type="number" class="fc" id="lc-c" step="0.01"></div>
        <div class="fg"><label class="fl">Prix colis supp. (&euro;HT)</label><input type="number" class="fc" id="lc-d" step="0.01"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Lieu de livraison</label>
          <select class="fc" id="lc-e"><option>Pied de camion</option><option>Pi&egrave;ce du choix</option><option>Tous</option></select>
        </div>
        <div class="fg"><label class="fl">Seuil devis auto (nb colis)</label><input type="number" class="fc" id="lc-f" placeholder="Laisser vide = pas de seuil"></div>
      </div>
    </div>
    <div class="mf"><button class="btn bg" onclick="hideModal('mc2')">Annuler</button><button class="btn bp" onclick="addCategorieColis()">Ajouter</button></div>
  </div>
</div>

<!-- Modal option -->
<div class="mo" id="mo2" style="display:none">
  <div class="md">
    <div class="mh"><span class="mt">Ajouter une option de livraison</span><button class="mc" onclick="hideModal('mo2')">&#10005;</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">Nom *</label><input type="text" class="fc" id="op-n" placeholder="Ex: Manutention, Installation"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Prix (&euro;HT)</label><input type="number" class="fc" id="op-p" step="0.01"></div>
        <div class="fg"><label class="fl">Unit&eacute;</label>
          <select class="fc" id="op-u"><option>Forfait</option><option>Par 30 minutes</option><option>Par colis</option><option>Par &eacute;tage</option></select>
        </div>
      </div>
    </div>
    <div class="mf"><button class="btn bg" onclick="hideModal('mo2')">Annuler</button><button class="btn bp" onclick="addOption()">Ajouter</button></div>
  </div>
</div>

<!-- Modal associer client -->
<div class="mo" id="modal-associate-client" style="display:none">
  <div class="md">
    <div class="mh"><span class="mt">Associer un client</span><button class="mc" onclick="hideModal('modal-associate-client')">&#10005;</button></div>
    <div class="mb">
      <div class="fg">
        <label class="fl">Entreprise *</label>
        <select class="fc" id="assoc-entreprise">
          <option value="">-- S&eacute;lectionnez une entreprise --</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="assoc-devis"> Activer le mode devis
        </label>
      </div>
    </div>
    <div class="mf">
      <button class="btn bg" onclick="hideModal('modal-associate-client')">Annuler</button>
      <button class="btn bp" onclick="associateClient()">Associer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================================================================
   NAMY TMS — Grilles tarifaires
   FISSA LIV — Code source lisible
   ================================================================ */

// ─── STATE ─────────────────────────────────────────────────────
let activeGrilleId = 1;
let entreprisesList = [];

let CLIENTS = [
  { id: 1, nom: 'TRUFFAUT LE CHESNAY',        gid: 1, devis: false },
  { id: 2, nom: 'TRUFFAUT PLAISIR',           gid: 1, devis: false },
  { id: 3, nom: 'TRUFFAUT DOMUS',             gid: 1, devis: true },
  { id: 4, nom: 'TRUFFAUT PARIS RIVE GAUCHE', gid: 1, devis: false },
  { id: 5, nom: 'TRUFFAUT FOURQUEUX',         gid: 1, devis: false },
  { id: 6, nom: 'FISSA LIV',                  gid: 2, devis: true },
  { id: 7, nom: 'CLIENT EXPRESS DEMO',        gid: 2, devis: false },
  { id: 8, nom: 'LITERIE PARTENAIRE',         gid: 3, devis: true },
];

let grilles = [
  {
    id: 1, nom: 'TRUFFAUT STANDARD', type: 'poids', rayon: 30, maj: 20,
    lignes: [
      { id: 1, poidsMin: 0,   poidsMax: 5,    colisMax: 5,   dimMax: 150, prixPiedCamion: 10,  prixLieuChoix: 10 },
      { id: 2, poidsMin: 5,   poidsMax: 20,   colisMax: 20,  dimMax: 200, prixPiedCamion: 15,  prixLieuChoix: 15 },
      { id: 3, poidsMin: 20,  poidsMax: 100,  colisMax: 30,  dimMax: 200, prixPiedCamion: 25,  prixLieuChoix: 25 },
      { id: 4, poidsMin: 100, poidsMax: 200,  colisMax: 130, dimMax: 320, prixPiedCamion: 40,  prixLieuChoix: 60 },
      { id: 5, poidsMin: 200, poidsMax: 500,  colisMax: 130, dimMax: 400, prixPiedCamion: 60,  prixLieuChoix: 100 },
      { id: 6, poidsMin: 500, poidsMax: 800,  colisMax: 130, dimMax: 400, prixPiedCamion: 80,  prixLieuChoix: 130 },
      { id: 7, poidsMin: 800, poidsMax: 1200, colisMax: 130, dimMax: 400, prixPiedCamion: 100, prixLieuChoix: 150 },
    ],
    frais: [
      { id: 1, actif: true,  description: 'Km suppl\u00e9mentaire (>30km)',        cout: '2,50 \u20ac/km',    note: 'A+R au-del\u00e0 du rayon' },
      { id: 2, actif: true,  description: 'Dimanche et jours f\u00e9ri\u00e9s',    cout: '+20%',              note: 'Sur tarif de base' },
      { id: 3, actif: true,  description: 'Produit lourd (90\u2013130kg)',          cout: '40 \u20ac/produit', note: 'Par article' },
      { id: 4, actif: true,  description: '\u00c9tage sans ascenseur',              cout: '15 \u20ac/\u00e9tage',  note: '\u00c0 partir du 5\u00e8me' },
      { id: 5, actif: true,  description: '\u00c9chec retrait / annulation JJ',     cout: '50% course',        note: '' },
      { id: 6, actif: true,  description: '\u00c9chec livraison + retour magasin',  cout: '150% course',       note: '' },
      { id: 7, actif: false, description: 'D\u00e9ballage et montage mobilier',     cout: '40 \u20ac/30min',   note: 'Jardin, barbecue' },
      { id: 8, actif: false, description: 'Rempotage plante (<50kg)',               cout: '10 \u20ac/plante',  note: '' },
      { id: 9, actif: false, description: 'Plateau grue (131\u2013500kg)',           cout: '180\u20ac+45\u20ac/suiv.', note: 'Transport sp\u00e9cialis\u00e9' },
    ],
    opts: [{ id: 1, n: 'Manutention', p: 40, u: 'Par 30 minutes' }]
  },
  {
    id: 2, nom: 'EXPRESS ZONE', type: 'zone', rayon: 45, maj: 30,
    zones: [

// ─── HELPERS ───────────────────────────────────────────────────
function getEl(id) {
  return document.getElementById(id);
}

function getVal(id) {
  const el = getEl(id);
  return el ? el.value : '';
}

function hideEl(id) {
  const el = getEl(id);
  if (el) el.style.display = 'none';
}

function showEl(id) {
  const el = getEl(id);
  if (el) el.style.display = 'block';
}

function showModal(id) {
  const el = getEl(id);
  if (el) el.style.display = 'flex';
  else console.error('[GRILLES] Modal introuvable:', id);
}

function hideModal(id) {
  const el = getEl(id);
  if (el) el.style.display = 'none';
}


// ─── DATA LOADING ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const [
      configRes,
      lignesRes,
      zonesRes,
      categoriesRes,
      fraisRes,
      optionsRes,
      clientsGrillesRes,
      entreprisesRes
    ] = await Promise.allSettled([
      db.from('grilles_tarifaires_config').select('*').order('id'),
      db.from('grilles_lignes').select('*').order('grille_id').order('poids_min'),
      db.from('grilles_zones').select('*').order('grille_id').order('code'),
      db.from('grilles_categories').select('*').order('grille_id').order('id'),
      db.from('grilles_frais').select('*').order('grille_id').order('id'),
      db.from('grilles_options').select('*').order('grille_id').order('id'),
      db.from('clients_grilles').select('*').order('id'),
      db.from('entreprises').select('*').order('nom')
    ]);

    // Load grilles from Supabase if available
    if (configRes.status === 'fulfilled' && configRes.value.data?.length) {
      const configs = configRes.value.data;
      const lignesData = lignesRes.status === 'fulfilled' ? (lignesRes.value.data || []) : [];
      const zonesData = zonesRes.status === 'fulfilled' ? (zonesRes.value.data || []) : [];
      const catsData = categoriesRes.status === 'fulfilled' ? (categoriesRes.value.data || []) : [];
      const fraisData = fraisRes.status === 'fulfilled' ? (fraisRes.value.data || []) : [];
      const optsData = optionsRes.status === 'fulfilled' ? (optionsRes.value.data || []) : [];

      grilles = configs.map(cfg => {
        const g = {
          id: cfg.id,
          nom: cfg.nom,
          type: cfg.type,
          rayon: cfg.rayon,
          maj: cfg.maj
        };

        // Attach lignes (poids)
        if (cfg.type === 'poids') {
          g.lignes = lignesData
            .filter(l => l.grille_id === cfg.id)
            .map(l => ({
              id: l.id,
              poidsMin: l.poids_min,
              poidsMax: l.poids_max,
              colisMax: l.colis_max,
              dimMax: l.dim_max,
              prixPiedCamion: l.prix_pied_camion,
              prixLieuChoix: l.prix_lieu_choix
            }));
        }

        // Attach zones
        if (cfg.type === 'zone') {
          g.zones = zonesData
            .filter(z => z.grille_id === cfg.id)
            .map(z => ({
              id: z.id,
              c: z.code,
              lb: z.label,
              t1: z.t1,
              t2: z.t2,
              t3: z.t3,
              km: (z.km_t1 != null) ? { t1: z.km_t1, t2: z.km_t2, t3: z.km_t3 } : null
            }));
        }

        // Attach categories (colis)
        if (cfg.type === 'colis') {
          g.cats = catsData
            .filter(c => c.grille_id === cfg.id)
            .map(c => ({
              id: c.id,
              n: c.nom,
              a: c.nb_min,
              b: c.nb_max,
              p: c.prix_base,
              s: c.prix_supp,
              l: c.lieu,
              ds: c.seuil_devis
            }));
          g.dist = []; // distance rules could be loaded separately
        }

        // Attach frais
        g.frais = fraisData
          .filter(f => f.grille_id === cfg.id)
          .map(f => ({
            id: f.id,
            actif: f.actif,
            description: f.description,
            cout: f.cout,
            note: f.note
          }));

        // Attach options
        g.opts = optsData
          .filter(o => o.grille_id === cfg.id)
          .map(o => ({
            id: o.id,
            n: o.nom,
            p: o.prix,
            u: o.unite
          }));

        return g;
      });

      console.log('[GRILLES] Config charg\u00e9e depuis Supabase');
    }

    // Load clients_grilles
    if (clientsGrillesRes.status === 'fulfilled' && clientsGrillesRes.value.data?.length) {
      CLIENTS = clientsGrillesRes.value.data.map(c => ({
        id: c.id,
        nom: c.client_id, // will be resolved later
        gid: c.grille_id,
        devis: c.mode_devis
      }));
      console.log('[GRILLES] Clients charg\u00e9s depuis Supabase');
    }

    // Load entreprises
    if (entreprisesRes.status === 'fulfilled' && entreprisesRes.value.data?.length) {
      entreprisesList = entreprisesRes.value.data;
    }

    console.log('[GRILLES] Donn\u00e9es charg\u00e9es depuis Supabase');
  } catch (err) {
    console.warn('[GRILLES] Erreur Supabase, donn\u00e9es locales:', err);
  }

  renderSidebar();
  renderGrid(activeGrilleId);
});


// ─── SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  getEl('gl').innerHTML = grilles.map(g => {
    const clientsForGrille = CLIENTS.filter(c => c.gid === g.id);
    return `<div class="gi ${g.id === activeGrilleId ? 'on' : ''}" onclick="selectGrille(${g.id})">
      <div class="gi-nm">${g.nom}</div>
      <div class="gi-mt">${clientsForGrille.length} client(s) \u00b7 ${g.rayon}km inclus</div>
      <div class="gi-tg">
        <span class="tbadge t-${g.type}">${g.type === 'poids' ? '\u2696\ufe0f Poids' : g.type === 'zone' ? '\ud83d\udccd Zone' : '\ud83d\udce6 Colis'}</span>
        ${clientsForGrille.some(c => c.devis) ? '<span class="tbadge" style="background:var(--wl);color:var(--warn)">\ud83d\udcac Devis</span>' : ''}
      </div>
    </div>`;
  }).join('');
}


// ─── GRILLE SELECTION ──────────────────────────────────────────
function selectGrille(id) {
  activeGrilleId = id;
  renderSidebar();
  renderGrid(id);
}


// ─── RENDER GRID ───────────────────────────────────────────────
function renderGrid(id) {
  const g = grilles.find(x => x.id === id);
  if (!g) return;
  const mainEl = getEl('main');
  if (g.type === 'poids') {
    mainEl.innerHTML = buildPoidsPanel(g);
  } else if (g.type === 'zone') {
    mainEl.innerHTML = buildZonePanel(g);
  } else {
    mainEl.innerHTML = buildColisPanel(g);
  }
}

// ─── CALCULATEURS ──────────────────────────────────────────────
function calculatePoids(gid) {
  const g = grilles.find(x => x.id === gid);
  const poids = parseFloat(getVal('sp-p')) || 0;
  const km = parseFloat(getVal('sp-k')) || 0;
  const option = getVal('sp-o') || 'pied';

  if (!poids) {
    hideEl('sp-r');
    showEl('sp-e');
    return;
  }

  const ligne = g.lignes.find(x => poids >= x.poidsMin && poids < x.poidsMax);
  if (!ligne) {
    getEl('sp-e').textContent = `\u26a0\ufe0f Poids ${poids}kg hors grille`;
    hideEl('sp-r');
    showEl('sp-e');
    return;
  }

  let base = (option === 'pied') ? ligne.prixPiedCamion : ligne.prixLieuChoix;
  let lines = [{ l: `Tarif base (${poids}kg \u00b7 ${option === 'pied' ? 'Pied camion' : 'Lieu choix'})`, v: base }];
  let total = base;

  if (km > g.rayon) {
    const supp = (km - g.rayon) * 2 * 2.5;
    lines.push({ l: `Km supp. (${(km - g.rayon) * 2}km A+R \u00d7 2,50\u20ac)`, v: supp });
    total += supp;
  }

  document.querySelectorAll('.fck.on').forEach(chip => {
    const text = chip.textContent.trim();
    if (text.includes('Dim/F\u00e9ri\u00e9')) {
      const majoration = total * g.maj / 100;
      lines.push({ l: `Dim/F\u00e9ri\u00e9 (+${g.maj}%)`, v: majoration });
      total += majoration;
    }
    if (text.includes('Produit lourd')) {
      lines.push({ l: 'Produit lourd \u00d71', v: 40 });
      total += 40;
    }
    if (text.includes('\u00c9tage')) {
      lines.push({ l: '\u00c9tage \u00d71', v: 15 });
      total += 15;
    }
    if (text.includes('D\u00e9ballage')) {
      lines.push({ l: 'D\u00e9ballage/Montage', v: 40 });
      total += 40;
    }
  });

  showResult('sp-r', 'sp-e', lines, total);
}

function calculateZone(gid) {
  const g = grilles.find(x => x.id === gid);
  const km = parseFloat(getVal('sz-k')) || 0;
  const vehicule = getVal('sz-v') || 't1';
  const jour = getVal('sz-j') || 's';
  const manut = parseFloat(getVal('sz-m')) || 0;

  if (!km) {
    hideEl('sz-r');
    showEl('sz-e');
    return;
  }

  const zone = g.zones.find(x =>
    (x.c === 'A' && km < 15) ||
    (x.c === 'B' && km < 25) ||
    (x.c === 'C' && km < 35) ||
    (x.c === 'D' && km < 45) ||
    (x.c === 'E')
  );

  let base = zone.km ? km * 2 * zone.km[vehicule] : zone[vehicule];
  let lines = [{ l: `Zone ${zone.c} (${zone.lb}) \u00b7 ${vehicule.toUpperCase()}`, v: base }];
  let total = base;

  if (jour === 'f') {
    const majoration = total * g.maj / 100;
    lines.push({ l: `Dim/F\u00e9ri\u00e9 (+${g.maj}%)`, v: majoration });
    total += majoration;
  }

  if (manut > 0) {
    const units = Math.ceil(manut / 30);
    const cost = units * 30;
    lines.push({ l: `Manutention (${manut}min = ${units}\u00d730min)`, v: cost });
    total += cost;
  }

  showResult('sz-r', 'sz-e', lines, total);
}

function calculateColis(gid) {
  const g = grilles.find(x => x.id === gid);
  const nbColis = parseInt(getVal('sc-n')) || 0;
  const km = parseFloat(getVal('sc-k')) || 0;
  const cat = getVal('sc-c') || '';

  if (!nbColis || !cat) {
    hideEl('sc-r');
    showEl('sc-e');
    return;
  }

  const tranche = (g.cats || []).filter(c => c.n === cat).find(c => nbColis >= c.a && nbColis < c.b);
  if (!tranche || tranche.ds) {
    getEl('sc-r').innerHTML = `<div class="warn-b">\u26a0\ufe0f ${nbColis} colis "${cat}" \u2014 commande en <strong>mode devis</strong>. Elle sera soumise en attente de validation FISSA LIV.</div>`;
    showEl('sc-r');
    hideEl('sc-e');
    return;
  }

  let base = tranche.p;
  let extra = nbColis > tranche.a ? (nbColis - tranche.a) * tranche.s : 0;
  let lines = [{ l: `${cat} \u00b7 ${nbColis} colis`, v: base }];
  let total = base + extra;

  if (extra > 0) {
    lines.push({ l: `Colis supp. (${nbColis - tranche.a} \u00d7 ${tranche.s}\u20ac)`, v: extra });
  }

  if (km > 0 && g.dist[0]) {
    const distCost = km * g.dist[0].p;
    lines.push({ l: `Distance (${km}km \u00d7 ${g.dist[0].p}\u20ac)`, v: distCost });
    total += distCost;
  }

  document.querySelectorAll('.fck.on').forEach(chip => {
    g.opts.forEach(o => {
      if (chip.textContent.includes(o.n)) {
        lines.push({ l: `Option ${o.n}`, v: o.p });
        total += o.p;
      }
    });
  });

  showResult('sc-r', 'sc-e', lines, total);
}


// ─── SHOW RESULT ───────────────────────────────────────────────
function showResult(resultId, emptyId, lines, total) {
  const tva = total * 0.2;
  const ttc = total + tva;

  getEl(resultId).innerHTML = `<div class="srp">
    <div class="sls">
      ${lines.map(l => `<div class="sl"><span>${l.l}</span><span class="mn">${l.v.toFixed(2)} \u20ac</span></div>`).join('')}
      <div class="sl sep"><span>Total HT</span><span class="mn">${total.toFixed(2)} \u20ac</span></div>
      <div class="sl" style="color:var(--muted);font-size:12px"><span>TVA (20%)</span><span class="mn">${tva.toFixed(2)} \u20ac</span></div>
    </div>
    <div class="stb">
      <div><div class="stl">TOTAL TTC</div><div class="std">${total.toFixed(2)} \u20ac HT \u00b7 TVA ${tva.toFixed(2)} \u20ac</div></div>
      <div class="stv">${ttc.toFixed(2)} \u20ac</div>
    </div>
  </div>`;
  showEl(resultId);
  hideEl(emptyId);
}

// ─── ACTIONS: DUPLICATE GRILLE ─────────────────────────────────
async function duplicateGrille(id) {
  const g = grilles.find(x => x.id === id);
  const copy = JSON.parse(JSON.stringify(g));
  const localId = Math.max(...grilles.map(x => x.id)) + 1;
  copy.nom = g.nom + ' (copie)';

  try {
    const { data, error } = await db.from('grilles_tarifaires_config').insert({
      nom: copy.nom,
      type: copy.type,
      rayon: copy.rayon,
      maj: copy.maj
    }).select().single();

    if (data && !error) {
      copy.id = data.id;

      // Duplicate related data
      if (copy.lignes && copy.lignes.length) {
        await db.from('grilles_lignes').insert(copy.lignes.map(l => ({
          grille_id: copy.id,
          poids_min: l.poidsMin,
          poids_max: l.poidsMax,
          colis_max: l.colisMax,
          dim_max: l.dimMax,
          prix_pied_camion: l.prixPiedCamion,
          prix_lieu_choix: l.prixLieuChoix
        })));
      }
      if (copy.zones && copy.zones.length) {
        await db.from('grilles_zones').insert(copy.zones.map(z => ({
          grille_id: copy.id,
          code: z.c,
          label: z.lb,
          t1: z.t1,
          t2: z.t2,
          t3: z.t3,
          km_t1: z.km ? z.km.t1 : null,
          km_t2: z.km ? z.km.t2 : null,
          km_t3: z.km ? z.km.t3 : null
        })));
      }
      if (copy.frais && copy.frais.length) {
        await db.from('grilles_frais').insert(copy.frais.map(f => ({
          grille_id: copy.id,
          actif: f.actif,
          description: f.description,
          cout: f.cout,
          note: f.note
        })));
      }
      if (copy.opts && copy.opts.length) {
        await db.from('grilles_options').insert(copy.opts.map(o => ({
          grille_id: copy.id,
          nom: o.n,
          prix: o.p,
          unite: o.u
        })));
      }
    } else {
      copy.id = localId;
    }
  } catch (err) {
    console.warn('[GRILLES] Supabase duplicate failed:', err);
    copy.id = localId;
  }

  grilles.push(copy);
  selectGrille(copy.id);
  showToast(`\u29c9 "${copy.nom}" dupliqu\u00e9e`);
}

  const sources = entreprisesList.length > 0 ? entreprisesList : [];
  const alreadyAssigned = CLIENTS.filter(c => c.gid === gid).map(c => c.nom);

    sources.forEach(e => {

    });

    // Fallback: allow typing a custom name or show all known client names not yet assigned
    const allKnownNames = [...new Set(CLIENTS.map(c => c.nom))];
    allKnownNames.forEach(nom => {
      if (!alreadyAssigned.includes(nom)) {
        select.innerHTML += `<option value="${nom}">${nom}</option>`;
      }
    });
  }

  // Reset checkbox
  getEl('assoc-devis').checked = false;

  // Store the target grille id for the modal
  getEl('modal-associate-client').dataset.grilleId = gid;
  showModal('modal-associate-client');
}

async function associateClient() {
  const modal = getEl('modal-associate-client');
  const grilleId = parseInt(modal.dataset.grilleId);
  const selectEl = getEl('assoc-entreprise');
  const selectedValue = selectEl.value;
  const selectedText = selectEl.options[selectEl.selectedIndex]?.text || '';
  const modeDevis = getEl('assoc-devis').checked;

  if (!selectedValue) {
    showToast('\u26a0\ufe0f S\u00e9lectionnez une entreprise', 'warning');
    return;
  }

  let newId;
  try {
    const insertData = {
      grille_id: grilleId,
      client_id: selectedValue,
      mode_devis: modeDevis
    };
    const { data, error } = await db.from('clients_grilles').insert(insertData).select().single();

    if (data && !error) {
      newId = data.id;
    }
  } catch (err) {
    console.warn('[GRILLES] Supabase associate client failed:', err);
  }

  if (!newId) {
    newId = Math.max(...CLIENTS.map(c => c.id), 0) + 1;
  }

  CLIENTS.push({
    id: newId,
    nom: selectedText,
    gid: grilleId,
    devis: modeDevis
  });

  hideModal('modal-associate-client');
  renderSidebar();
  renderGrid(activeGrilleId);
  showToast(`\u2705 "${selectedText}" associ\u00e9 \u00e0 la grille`);
}

async function removeClientFromGrille(clientId, grilleId) {
  if (!confirm('Retirer ce client de la grille?')) return;

  try {
    await db.from('clients_grilles').delete().eq('id', clientId);
  } catch (err) {
    console.warn('[GRILLES] Supabase remove client failed:', err);
  }

  CLIENTS = CLIENTS.filter(c => !(c.id === clientId && c.gid === grilleId));
  renderSidebar();
  renderGrid(activeGrilleId);
  showToast('\ud83d\uddd1 Client retir\u00e9');
}


// ─── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(btn, id) {
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tp').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  getEl(id)?.classList.add('on');
}


// ─── MODAL OVERLAY CLOSE ──────────────────────────────────────
// Fermer les modaux en cliquant sur l'overlay (exécuté après le DOM)
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.mo').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.style.display = 'none';
    });
  });
});
</script>
